<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>히스토리 - 안주주식마켓</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#333;padding-bottom:72px}
.header{background:#1a1f2e;color:white;padding:16px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;flex:1}
.header a{color:rgba(255,255,255,0.65);font-size:13px;text-decoration:none;padding:4px 8px;border-radius:6px;background:rgba(255,255,255,0.1)}
.filter-section{background:white;padding:16px 20px 12px;border-bottom:1px solid #e8eaed}
.filter-title{font-size:11px;font-weight:700;color:#80868b;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.filter-group{display:flex;flex-direction:column;gap:5px}
.filter-group.span2{grid-column:1/-1}
.filter-group label{font-size:11px;color:#80868b;font-weight:600}
.date-row{display:grid;grid-template-columns:1fr 16px 1fr;align-items:center;gap:4px}
.date-sep{font-size:11px;color:#bbb;text-align:center}
select,input[type=date]{width:100%;padding:9px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;color:#202124;background:white;outline:none;-webkit-appearance:none;appearance:none}
select:focus,input[type=date]:focus{border-color:#1a1f2e}
.btn-row{display:flex;gap:8px;margin-top:14px}
.btn-apply{flex:1;padding:11px;background:#1a1f2e;color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-reset{padding:11px 16px;background:#f0f2f5;color:#5f6368;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.summary-card{margin:12px 16px 0;background:white;border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.summary-card .lbl{font-size:11px;color:#80868b;margin-bottom:3px}
.summary-card .val{font-size:19px;font-weight:700;color:#1a1f2e}
.summary-card .chg{font-size:12px;font-weight:600;margin-top:2px}
.up{color:#e74c3c}.down{color:#3498db}
.chart-card{margin:12px 16px;background:white;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.chart-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.chart-title{font-size:14px;font-weight:700;color:#1a1f2e}
.chart-sub{font-size:11px;color:#80868b;margin-top:2px}
.badge{font-size:11px;color:#6c63ff;background:#f0efff;padding:3px 9px;border-radius:10px;font-weight:600}
.chart-wrap{position:relative;height:280px}
.loading{padding:40px;text-align:center;color:#80868b;font-size:14px}
.error{padding:20px;text-align:center;color:#e74c3c;font-size:13px;background:#fff0f0;border-radius:8px;margin:12px 16px}
nav{position:fixed;bottom:0;left:0;width:100%;background:white;border-top:1px solid #e8eaed;display:grid;grid-template-columns:repeat(5,1fr);z-index:100}
nav a{display:flex;flex-direction:column;align-items:center;padding:9px 0 7px;text-decoration:none;color:#80868b;font-size:10px;gap:2px}
nav a.active{color:#1a1f2e;font-weight:700}
nav a .ic{font-size:21px}
</style>
</head>
<body>
<header class="header">
  <span style="font-size:22px">📈</span>
  <h1>히스토리</h1>
  <a href="index.html">← 홈</a>
</header>
<div class="filter-section">
  <div class="filter-title">🔍 필터 조건</div>
  <div class="filter-grid">
    <div class="filter-group span2">
      <label>📅 기간</label>
      <div class="date-row">
        <input type="date" id="dateFrom">
        <span class="date-sep">~</span>
        <input type="date" id="dateTo">
      </div>
    </div>
    <div class="filter-group">
      <label>👤 사용자</label>
      <select id="fUser"><option value="">전체</option></select>
    </div>
    <div class="filter-group">
      <label>🏦 금융기관</label>
      <select id="fInstitution"><option value="">전체</option></select>
    </div>
    <div class="filter-group">
      <label>📦 상품</label>
      <select id="fProduct"><option value="">전체</option></select>
    </div>
    <div class="filter-group">
      <label>📊 종목</label>
      <select id="fStock"><option value="">전체</option></select>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn-reset" onclick="resetFilters()">초기화</button>
    <button class="btn-apply" onclick="applyFilter()">📊 차트 조회</button>
  </div>
</div>
<div id="summaryArea"></div>
<div id="chartArea"><div class="loading">⏳ 데이터 불러오는 중...</div></div>
<nav>
  <a href="index.html"><span class="ic">📊</span>통계</a>
  <a href="https://www.appsheet.com/start/c98f983c-1548-4969-be9d-9e2120741c00#view=Trading" target="_blank"><span class="ic">✏️</span>거래입력</a>
  <a href="history.html" class="active"><span class="ic">📈</span>히스토리</a>
  <a href="https://www.appsheet.com/start/c98f983c-1548-4969-be9d-9e2120741c00#view=Setting" target="_blank"><span class="ic">⚙️</span>설정</a>
  <a href="https://www.appsheet.com/start/c98f983c-1548-4969-be9d-9e2120741c00#view=Snapshot" target="_blank"><span class="ic">📷</span>스냅샷</a>
</nav>
<script>
var GAS='https://script.google.com/macros/s/AKfycbw42bSbW1U2SUfta-d1cjYDD5PZG6q4JeIy5yYePRKLXTWU78ueprlss2SjHSK3GpVz6g/exec';
var allData=[],myChart=null;
function num(n){return Math.round(n).toLocaleString('ko-KR');}
function fmtDate(d){if(!d)return'';if(d.indexOf('/')!==-1){var p=d.split('/');return p[0]+'-'+p[1].padStart(2,'0')+'-'+p[2].padStart(2,'0');}return d;}
(function(){var now=new Date(),y1=new Date(now);y1.setFullYear(now.getFullYear()-1);document.getElementById('dateTo').value=now.toISOString().slice(0,10);document.getElementById('dateFrom').value=y1.toISOString().slice(0,10);})();
function loadSnapshot(){
  document.getElementById('chartArea').innerHTML='<div class="loading">⏳ 데이터 불러오는 중...</div>';
  document.getElementById('summaryArea').innerHTML='';
  fetch(GAS+'?action=api&type=snapshot').then(function(r){return r.json();}).then(function(data){allData=data;populateFilters(data);renderChart(data);}).catch(function(e){document.getElementById('chartArea').innerHTML='<div class="error">❌ 로드 실패: '+e.message+'</div>';});
}
function populateFilters(data){
  var users=[],insts=[],prods=[],stocks=[];
  data.forEach(function(r){if(r.사용자&&users.indexOf(r.사용자)===-1)users.push(r.사용자);if(r.금융기관&&insts.indexOf(r.금융기관)===-1)insts.push(r.금융기관);if(r.상품&&prods.indexOf(r.상품)===-1)prods.push(r.상품);if(r.종목&&stocks.indexOf(r.종목)===-1)stocks.push(r.종목);});
  fillSel('fUser',users);fillSel('fInstitution',insts);fillSel('fProduct',prods);fillSel('fStock',stocks);
}
function fillSel(id,arr){var sel=document.getElementById(id);sel.innerHTML='<option value="">전체</option>';arr.sort().forEach(function(v){var o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);});}
function applyFilter(){
  var from=document.getElementById('dateFrom').value,to=document.getElementById('dateTo').value;
  var user=document.getElementById('fUser').value,inst=document.getElementById('fInstitution').value;
  var prod=document.getElementById('fProduct').value,stock=document.getElementById('fStock').value;
  var filtered=allData.filter(function(r){var d=fmtDate(r.날짜);if(from&&d<from)return false;if(to&&d>to)return false;if(user&&r.사용자!==user)return false;if(inst&&r.금융기관!==inst)return false;if(prod&&r.상품!==prod)return false;if(stock&&r.종목!==stock)return false;return true;});
  renderChart(filtered);
}
function resetFilters(){var now=new Date(),y1=new Date(now);y1.setFullYear(now.getFullYear()-1);document.getElementById('dateTo').value=now.toISOString().slice(0,10);document.getElementById('dateFrom').value=y1.toISOString().slice(0,10);['fUser','fInstitution','fProduct','fStock'].forEach(function(id){document.getElementById(id).value='';});renderChart(allData);}
function renderChart(data){
  if(!data||!data.length){document.getElementById('summaryArea').innerHTML='';document.getElementById('chartArea').innerHTML='<div class="error">조건에 맞는 데이터가 없습니다.</div>';return;}
  var byDate={};
  data.forEach(function(r){var d=fmtDate(r.날짜)||'';if(!d)return;byDate[d]=(byDate[d]||0)+(parseFloat(r.평가액)||0);});
  var dates=Object.keys(byDate).sort(),vals=dates.map(function(d){return byDate[d];});
  var latest=vals[vals.length-1]||0,first=vals[0]||0,diff=latest-first,pct=first?((diff/first)*100).toFixed(2):0,isUp=diff>=0;
  document.getElementById('summaryArea').innerHTML='<div class="summary-card"><div><div class="lbl">조회 결과 총 평가액</div><div class="val">₩'+num(latest)+'</div></div><div style="text-align:right"><div class="lbl">기간 변화</div><div class="chg '+(isUp?'up':'down')+'">'+(isUp?'▲':'▼')+' '+(isUp?'+':'')+'₩'+num(diff)+' ('+(isUp?'+':'')+pct+'%)</div></div></div>';
  document.getElementById('chartArea').innerHTML='<div class="chart-card"><div class="chart-top"><div><div class="chart-title">📈 평가액 추이</div><div class="chart-sub">날짜별 필터 조건 평가액 합산</div></div><span class="badge">'+dates.length+' 포인트</span></div><div class="chart-wrap"><canvas id="myChart"></canvas></div></div>';
  var ctx=document.getElementById('myChart').getContext('2d');
  if(myChart){myChart.destroy();myChart=null;}
  myChart=new Chart(ctx,{type:'line',data:{labels:dates.map(function(d){return d.slice(5);}),datasets:[{label:'평가액',data:vals,borderColor:'#1a1f2e',backgroundColor:'rgba(26,31,46,0.06)',borderWidth:2,pointRadius:dates.length>30?2:4,pointBackgroundColor:'#1a1f2e',pointHoverRadius:6,fill:true,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return'₩'+num(c.raw);}}}},scales:{y:{ticks:{callback:function(v){return'₩'+(v>=10000000?(v/10000000).toFixed(1)+'천만':(v/10000).toFixed(0)+'만');},font:{size:10}},grid:{color:'rgba(0,0,0,0.05)'}},x:{ticks:{font:{size:10},maxTicksLimit:12},grid:{display:false}}}}});
}
loadSnapshot();
</script>
</body>
</html>
