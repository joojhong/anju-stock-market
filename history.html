<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">     <meta name="apple-mobile-web-app-capable" content="yes">     <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">     <meta name="mobile-web-app-capable" content="yes">     <meta name="theme-color" content="#1a1f2e">     <link rel="manifest" href="manifest.json">
<title>铆聫聣锚掳聙矛聲隆 铆聻聢矛聤陇铆聠聽毛娄卢 - 矛聲聢矛拢录矛拢录矛聥聺毛搂聢矛录聯</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#333;padding-bottom:72px}
.header {background: #ffffff;color: #1a1f2e;padding:16px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;flex:1}
.header a{color:#666;font-size:13px;text-decoration:none;padding:4px 8px;border-radius:6px;background:rgba(255,255,255,0.1)}
.filter-section{background:white;padding:16px 20px 12px;border-bottom:1px solid #e8eaed}
.filter-title{font-size:11px;font-weight:700;color:#80868b;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.filter-group{display:flex;flex-direction:column;gap:5px}
.filter-group.span2{grid-column:1/-1}
.filter-group label{font-size:11px;color:#80868b;font-weight:600}
.date-row{display:grid;grid-template-columns:1fr 16px 1fr;align-items:center;gap:4px}
.date-sep{font-size:11px;color:#bbb;text-align:center}
select,input[type=date]{width:100%;padding:9px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;color:#202124;background:white;outline:none;-webkit-appearance:none;appearance:none}
select:focus,input[type=date]:focus{border-color:#1a1f2e}
.btn-row{display:flex;gap:8px;margin-top:14px}
.btn-apply{flex:1;padding:11px;background:#1a1f2e;color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-reset{padding:11px 16px;background:#f0f2f5;color:#5f6368;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.summary-card{margin:12px 16px 0;background:white;border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.summary-card .lbl{font-size:11px;color:#80868b;margin-bottom:3px}
.summary-card .val{font-size:19px;font-weight:700;color:#1a1f2e}
.summary-card .chg{font-size:12px;font-weight:600;margin-top:2px}
.up{color:#e74c3c}.down{color:#3498db}
.chart-card{margin:12px 16px;background:white;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.chart-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.chart-title{font-size:14px;font-weight:700;color:#1a1f2e}
.chart-sub{font-size:11px;color:#80868b;margin-top:2px}
.badge{font-size:11px;color:#6c63ff;background:#f0efff;padding:3px 9px;border-radius:10px;font-weight:600}
.chart-wrap{position:relative;height:280px}
.loading{padding:40px;text-align:center;color:#80868b;font-size:14px}
.error{padding:20px;text-align:center;color:#e74c3c;font-size:13px;background:#fff0f0;border-radius:8px;margin:12px 16px}
nav {position:fixed;bottom:0;left:0;width:100%;background: #ffffff;border-top: 1px solid #e0e0e0;display:grid;grid-template-columns:repeat(5,1fr);z-index:100}
nav a {display:flex;flex-direction:column;align-items:center;padding:9px 0 7px;text-decoration:none;color: #999;font-size:10px;gap:2px}
nav a.active {color: #1a1f2e;font-weight:700}
nav a .ic{font-size:21px}
</style>
</head>
<body>
<header class="header">
<span style="font-size:22px">冒聼聯聢</span>
<h1>铆聫聣锚掳聙矛聲隆 铆聻聢矛聤陇铆聠聽毛娄卢</h1>
<a href="index.html">芒聠聬 铆聶聢</a>
</header>
<div class="filter-section">
<div class="filter-title">冒聼聰聧 铆聲聞铆聞掳 矛隆掳锚卤麓</div>
<div class="filter-grid">
<div class="filter-group span2">
<label>冒聼聯聟 锚赂掳锚掳聞</label>
<div class="date-row">
<input type="date" id="dateFrom">
<span class="date-sep">~</span>
<input type="date" id="dateTo">
</div>
</div>
<div class="filter-group">
<label>冒聼聭陇 矛聜卢矛職漏矛聻聬</label>
<select id="fUser"><option value="">矛聽聞矛虏麓</option></select>
</div>
<div class="filter-group">
<label>冒聼聫娄 锚赂聢矛聹碌锚赂掳锚麓聙</label>
<select id="fInstitution"><option value="">矛聽聞矛虏麓</option></select>
</div>
<div class="filter-group">
<label>冒聼聯娄 矛聝聛铆聮聢</label>
<select id="fProduct"><option value="">矛聽聞矛虏麓</option></select>
</div>
<div class="filter-group">
<label>冒聼聯聤 矛垄聟毛陋漏</label>
<select id="fStock"><option value="">矛聽聞矛虏麓</option></select>
</div>
</div>
<div class="btn-row">
<button class="btn-reset" onclick="resetFilters()">矛麓聢锚赂掳铆聶聰</button>
<button class="btn-apply" onclick="applyFilter()">冒聼聯聤 矛掳篓铆聤赂 矛隆掳铆職聦</button>
</div>
</div>
<div id="summaryArea"></div>
<div id="chartArea"><div class="loading">芒聫鲁 毛聧掳矛聺麓铆聞掳 毛露聢毛聼卢矛聵陇毛聤聰 矛陇聭...</div></div>
<nav>
<a href="index.html"><span class="ic">冒聼聯聤</span>铆聠碌锚鲁聞</a>
<a href="trading.html"><span class="ic">芒聹聫茂赂聫</span>锚卤掳毛聻聵矛聻聟毛聽楼</a>
<a href="history.html" class="active"><span class="ic">冒聼聯聢</span>铆聻聢矛聤陇铆聠聽毛娄卢</a>
<a href="setting.html"><span class="ic">芒職聶茂赂聫</span>矛聞陇矛聽聲</a>
<a href="snapshot.html"><span class="ic">冒聼聯路</span>矛聤陇毛聝聟矛聝路</a>
</nav>
<script>
var GAS='https://script.google.com/macros/s/AKfycbw42bSbW1U2SUfta-d1cjYDD5PZG6q4JeIy5yYePRKLXTWU78ueprlss2SjHSK3GpVz6g/exec';
var allData=[],myChart=null,labelsMap={矛聜卢矛職漏矛聻聬:{},锚赂聢矛聹碌锚赂掳锚麓聙:{},矛聝聛铆聮聢:{},矛垄聟毛陋漏:{}};
function num(n){return Math.round(n).toLocaleString('ko-KR');}
function fmtDate(d){if(!d)return'';if(d.indexOf('/')!==-1){var p=d.split('/');return p[0]+'-'+p[1].padStart(2,'0')+'-'+p[2].padStart(2,'0');}return d;}
(function(){var now=new Date(),y1=new Date(now);y1.setFullYear(now.getFullYear()-1);document.getElementById('dateTo').value=now.toISOString().slice(0,10);document.getElementById('dateFrom').value=y1.toISOString().slice(0,10);})();
function loadLabels(cb){
fetch(GAS+'?action=api&type=labels').then(function(r){return r.json();}).then(function(data){
labelsMap=data;cb();
}).catch(function(){cb();});
}
function loadSnapshot(){
document.getElementById('chartArea').innerHTML='<div class="loading">芒聫鲁 毛聧掳矛聺麓铆聞掳 毛露聢毛聼卢矛聵陇毛聤聰 矛陇聭...</div>';
document.getElementById('summaryArea').innerHTML='';
fetch(GAS+'?action=api&type=snapshot').then(function(r){return r.json();}).then(function(data){allData=data;populateFilters(data);applyFilter();}).catch(function(e){document.getElementById('chartArea').innerHTML='<div class="error">芒聺聦 毛隆聹毛聯聹 矛聥陇铆聦篓: '+e.message+'</div>';});
}
function populateFilters(data){
var users=[],insts=[],prods=[],stocks=[];
data.forEach(function(r){
if(r.矛聜卢矛職漏矛聻聬ID&&users.indexOf(r.矛聜卢矛職漏矛聻聬ID)===-1)users.push(r.矛聜卢矛職漏矛聻聬ID);
if(r.锚赂聢矛聹碌锚赂掳锚麓聙ID&&insts.indexOf(r.锚赂聢矛聹碌锚赂掳锚麓聙ID)===-1)insts.push(r.锚赂聢矛聹碌锚赂掳锚麓聙ID);
if(r.矛聝聛铆聮聢ID&&prods.indexOf(r.矛聝聛铆聮聢ID)===-1)prods.push(r.矛聝聛铆聮聢ID);
if(r.矛垄聟毛陋漏矛陆聰毛聯聹&&stocks.indexOf(r.矛垄聟毛陋漏矛陆聰毛聯聹)===-1)stocks.push(r.矛垄聟毛陋漏矛陆聰毛聯聹);
});
fillSel('fUser',users,'矛聜卢矛職漏矛聻聬');
fillSel('fInstitution',insts,'锚赂聢矛聹碌锚赂掳锚麓聙');
fillSel('fProduct',prods,'矛聝聛铆聮聢');
fillSel('fStock',stocks,'矛垄聟毛陋漏');
}
function fillSel(id,arr,type){
var sel=document.getElementById(id);
sel.innerHTML='<option value="">矛聽聞矛虏麓</option>';
arr.sort().forEach(function(v){
var o=document.createElement('option');
o.value=v;
o.textContent=(labelsMap[type]&&labelsMap[type][v])?labelsMap[type][v]:v;
sel.appendChild(o);
});
}
function applyFilter(){
var from=document.getElementById('dateFrom').value,to=document.getElementById('dateTo').value;
var user=document.getElementById('fUser').value,inst=document.getElementById('fInstitution').value;
var prod=document.getElementById('fProduct').value,stock=document.getElementById('fStock').value;
var filtered=allData.filter(function(r){var d=fmtDate(r.毛聜聽矛搂聹);if(from&&d<from)return false;if(to&&d>to)return false;if(user&&r.矛聜卢矛職漏矛聻聬ID!==user)return false;if(inst&&r.锚赂聢矛聹碌锚赂掳锚麓聙ID!==inst)return false;if(prod&&r.矛聝聛铆聮聢ID!==prod)return false;if(stock&&r.矛垄聟毛陋漏矛陆聰毛聯聹!==stock)return false;return true;});
renderChart(filtered);
}
function resetFilters(){var now=new Date(),y1=new Date(now);y1.setFullYear(now.getFullYear()-1);document.getElementById('dateTo').value=now.toISOString().slice(0,10);document.getElementById('dateFrom').value=y1.toISOString().slice(0,10);['fUser','fInstitution','fProduct','fStock'].forEach(function(id){document.getElementById(id).value='';});applyFilter();}
function renderChart(data){
if(!data||!data.length){document.getElementById('summaryArea').innerHTML='';document.getElementById('chartArea').innerHTML='<div class="error">矛隆掳锚卤麓矛聴聬 毛搂聻毛聤聰 毛聧掳矛聺麓铆聞掳锚掳聙 矛聴聠矛聤碌毛聥聢毛聥陇.</div>';return;}
var byDate={};
data.forEach(function(r){var d=fmtDate(r.毛聜聽矛搂聹);if(!byDate[d])byDate[d]=0;byDate[d]+=Number(r.铆聫聣锚掳聙矛聲隆)||0;});
var dates=Object.keys(byDate).sort();
var vals=dates.map(function(d){return byDate[d];});
var first=vals[0]||0,last=vals[vals.length-1]||0,diff=last-first,pct=first?((diff/first)*100):0;
var sHtml='<div class="summary-card"><div><div class="lbl">矛隆掳铆職聦 锚虏掳锚鲁录 矛麓聺 铆聫聣锚掳聙矛聲隆</div><div class="val">芒聜漏'+num(last)+'</div></div><div style="text-align:right"><div class="lbl">锚赂掳锚掳聞 毛鲁聙铆聶聰</div><div class="chg '+(diff>=0?'up':'down')+'">'+(diff>=0?'芒聳虏':'芒聳录')+' '+(diff>=0?'+':'')+' 芒聜漏'+num(diff)+' ('+(pct>=0?'+':'')+pct.toFixed(2)+'%)</div></div></div>';
document.getElementById('summaryArea').innerHTML=sHtml;
var cHtml='<div class="chart-card"><div class="chart-top"><div><div class="chart-title">冒聼聯聢 铆聫聣锚掳聙矛聲隆 矛露聰矛聺麓</div><div class="chart-sub">毛聜聽矛搂聹毛鲁聞 铆聲聞铆聞掳 矛隆掳锚卤麓 铆聫聣锚掳聙矛聲隆 铆聲漏矛聜掳</div></div><span class="badge">'+dates.length+' 铆聫卢矛聺赂铆聤赂</span></div><div class="chart-wrap"><canvas id="myChart"></canvas></div></div>';
document.getElementById('chartArea').innerHTML=cHtml;
if(myChart){myChart.destroy();myChart=null;}
var ctx=document.getElementById('myChart').getContext('2d');
myChart=new Chart(ctx,{type:'line',data:{labels:dates,datasets:[{data:vals,borderColor:'#1a1f2e',backgroundColor:'rgba(26,31,46,0.06)',borderWidth:2,pointRadius:dates.length<=30?4:2,pointBackgroundColor:'#1a1f2e',fill:true,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return' 芒聜漏'+num(c.raw);}}}},scales:{x:{grid:{display:false},ticks:{maxTicksLimit:8,font:{size:11},callback:function(v,i,t){var d=dates[i];if(!d)return'';var p=d.split('-');return p[0].slice(2)+'/'+p[1]+'/'+p[2];}}},y:{grid:{color:'#f0f2f5'},ticks:{callback:function(v){var m=v/1000000;return'芒聜漏'+(Number.isInteger(m)?m:m.toFixed(1))+'毛掳卤毛搂聦';},font:{size:11}}}}}});
}
loadLabels(loadSnapshot);
</script>
</body>
</html>
