<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1f2e">
    <link rel="manifest" href="manifest.json">
<title>矛聲聢矛拢录矛拢录矛聥聺毛搂聢矛录聯</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,sans-serif; background:#f0f2f5; color:#333; padding-bottom:72px; }
.header { background: #ffffff; color: #1a1f2e; padding:16px 20px; position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.header-indices { display:flex; gap:6px; align-items:center; flex-shrink:0; font-size:10px; }
.idx-item { display:flex; flex-direction:column; align-items:center; min-width:54px; }
.idx-label { font-size:9px; font-weight:700; color:#555; }
.idx-val { font-size:10px; font-weight:700; }
.idx-val.up { color:#d32f2f; }
.idx-val.down { color:#1565c0; }
.header h1 { font-size:18px; font-weight:700; }
.filter-wrap { padding:12px 16px; background:white; border-bottom:1px solid #eee; }
select { width:100%; padding:10px 14px; border:1.5px solid #ddd; border-radius:10px; font-size:15px; background:white; color:#333; }
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:14px; }
.stat-card { background:white; border-radius:14px; padding:14px; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
.stat-card.full { grid-column:span 2; }
.stat-label { font-size:11px; color:#999; margin-bottom:6px; font-weight:600; }
.stat-value { font-size:20px; font-weight:800; }
.up { color:#e74c3c; }
.down { color:#3498db; }
.section { padding:8px 16px; font-size:12px; color:#888; font-weight:700; background:#f0f2f5; }
.stock-list { background:white; }
.stock-item { display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid #f5f5f5; }
.stock-info { flex:1; }
.stock-name { font-size:14px; font-weight:600; }
.stock-price { font-size:11px; color:#aaa; margin-top:2px; }
.stock-vals { text-align:right; }
.stock-eval { font-size:15px; font-weight:700; }
.stock-rates { font-size:11px; margin-top:3px; }
.loading { text-align:center; padding:50px; color:#aaa; font-size:14px; }
nav { position:fixed; bottom:0; left:0; width:100%; background: #ffffff; border-top: 1px solid #e0e0e0; display:grid; grid-template-columns:repeat(5,1fr); z-index:100; }
nav a { display:flex; flex-direction:column; align-items:center; padding:9px 0 7px; text-decoration:none; color: #999; font-size:10px; gap:2px; }
nav a.active { color: #1a1f2e; font-weight:700; }
nav a .ic { font-size:21px; }
</style>
</head>
<body>
<div class="header"><h1>冒聼聯聤 矛聲聢矛拢录矛拢录矛聥聺毛搂聢矛录聯</h1><div class="header-indices" id="headerIndices"><span class="idx-item"><span class="idx-label">SPX</span><span class="idx-val" id="idxSPX">-</span></span><span class="idx-item"><span class="idx-label">NDX</span><span class="idx-val" id="idxNDX">-</span></span><span class="idx-item"><span class="idx-label">SPMO</span><span class="idx-val" id="idxSPMO">-</span></span></div></div>
<div class="filter-wrap">
<select id="userFilter" onchange="loadData()"><option value="矛聽聞矛虏麓">芒聫鲁 毛露聢毛聼卢矛聵陇毛聤聰 矛陇聭...</option></select>
</div>
<div id="content"><div class="loading">芒聫鲁 毛聧掳矛聺麓铆聞掳 毛露聢毛聼卢矛聵陇毛聤聰 矛陇聭...</div></div>
<nav>
<a class="active" href="index.html"><span class="ic">冒聼聯聤</span>铆聠碌锚鲁聞</a>
<a href="trading.html"><span class="ic">芒聹聫茂赂聫</span>锚卤掳毛聻聵矛聻聟毛聽楼</a>
<a href="history.html"><span class="ic">冒聼聯聢</span>铆聻聢矛聤陇铆聠聽毛娄卢</a>
<a href="setting.html"><span class="ic">芒職聶茂赂聫</span>矛聞陇矛聽聲</a>
<a href="snapshot.html"><span class="ic">冒聼聯路</span>矛聤陇毛聝聟矛聝路</a>
</nav>
<script>
var GAS_URL='https://script.google.com/macros/s/AKfycbz3VGPAtks3tzPOwdL2qq_-7CmL-DZNzVckv05adQvK-Q6C_k9_E_oPXraZi55P2lvrPw/exec';
function num(n){return Math.round(n).toLocaleString('ko-KR');}
function rate(r){return(r>=0?'+':'')+r.toFixed(2)+'%';}
function cls(v){return v>=0?'up':'down';}
function loadData(){
var filter=document.getElementById('userFilter').value;
document.getElementById('content').innerHTML='<div class="loading">芒聫鲁 毛露聢毛聼卢矛聵陇毛聤聰 矛陇聭...</div>';
fetch(GAS_URL+'?action=api&type=data&filter='+encodeURIComponent(filter))
.then(function(r){return r.json();}).then(render)
.catch(function(e){document.getElementById('content').innerHTML='<div class="loading">芒聺聦 矛聵陇毛楼聵: '+e.message+'</div>';});
}
function initFilters(){
fetch(GAS_URL+'?action=api&type=filters')
.then(function(r){return r.json();})
.then(function(options){
var sel=document.getElementById('userFilter');
sel.innerHTML='';
options.forEach(function(opt){var o=document.createElement('option');o.value=opt.value;o.text=opt.label;sel.appendChild(o);});
loadData();
}).catch(function(){document.getElementById('userFilter').innerHTML='<option value="矛聽聞矛虏麓">冒聼聭楼 矛聽聞矛虏麓</option>';loadData();});
}
function render(data){
var t=data.铆聠碌锚鲁聞;
var html='<div class="stats-grid">';
html+='<div class="stat-card full"><div class="stat-label">冒聼聮掳 矛麓聺 铆聫聣锚掳聙矛聲隆</div><div class="stat-value">芒聜漏'+num(t.矛麓聺铆聫聣锚掳聙矛聲隆)+'</div></div>';
html+='<div class="stat-card"><div class="stat-label">冒聼聯聢 矛聠聬矛聺碌锚赂聢</div><div class="stat-value '+cls(t.矛聠聬矛聺碌锚赂聢)+'">'+(t.矛聠聬矛聺碌锚赂聢>=0?'+':'')+'芒聜漏'+num(t.矛聠聬矛聺碌锚赂聢)+'</div></div>';
html+='<div class="stat-card"><div class="stat-label">冒聼聯聤 矛聠聬矛聺碌毛楼聽</div><div class="stat-value '+cls(t.矛聠聬矛聺碌毛楼聽)+'">'+rate(t.矛聠聬矛聺碌毛楼聽)+'</div></div>';
html+='<div class="stat-card"><div class="stat-label">冒聼聯聣 矛聽聞矛聺录毛聦聙毛鹿聞</div><div class="stat-value '+cls(t.矛聽聞矛聺录毛聦聙毛鹿聞锚赂聢矛聲隆)+'">'+(t.矛聽聞矛聺录毛聦聙毛鹿聞锚赂聢矛聲隆>=0?'+':'')+'芒聜漏'+num(t.矛聽聞矛聺录毛聦聙毛鹿聞锚赂聢矛聲隆)+'</div></div>';
html+='<div class="stat-card"><div class="stat-label">冒聼聰聞 矛聽聞矛聺录毛聦聙毛鹿聞矛聹篓</div><div class="stat-value '+cls(t.矛聽聞矛聺录毛聦聙毛鹿聞矛聹篓)+'">'+rate(t.矛聽聞矛聺录毛聦聙毛鹿聞矛聹篓)+'</div></div>';
html+='</div>';
html+='<div class="section">冒聼聯聢 毛鲁麓矛聹聽 矛垄聟毛陋漏</div><div class="stock-list">';
data.矛垄聟毛陋漏毛陋漏毛隆聺.forEach(function(s){
var qty=s.毛鲁麓矛聹聽矛聢聵毛聼聣?(' | '+s.毛鲁麓矛聹聽矛聢聵毛聼聣+'矛拢录'):'';
html+='<div class="stock-item"><div class="stock-info"><div class="stock-name">'+s.矛垄聟毛陋漏毛陋聟+'</div><div class="stock-price">铆聵聞矛聻卢锚掳聙 芒聜漏'+num(s.铆聵聞矛聻卢锚掳聙)+qty+'</div></div>';
html+='<div class="stock-vals"><div class="stock-eval">芒聜漏'+num(s.铆聫聣锚掳聙矛聲隆)+'</div><div class="stock-rates"><span class="'+cls(s.矛聠聬矛聺碌毛楼聽)+'">'+rate(s.矛聠聬矛聺碌毛楼聽)+'</span> | <span class="'+cls(s.矛聽聞矛聺录毛聦聙毛鹿聞矛聹篓)+'">'+rate(s.矛聽聞矛聺录毛聦聙毛鹿聞矛聹篓)+'</span></div></div></div>';
});
html+='</div>';
document.getElementById('content').innerHTML=html;
}
initFilters();
</script>
<script>
async function loadMarketIndices() {
  try {
    var res = await fetch(GAS_URL + '?action=api&type=indices');
    var data = await res.json();
    var map = {SPX: 'idxSPX', NDX: 'idxNDX', SPMO: 'idxSPMO'};
    data.forEach(function(item) {
      var id = map[item.name];
      if (!id) return;
      var el = document.getElementById(id);
      if (!el) return;
      var pct = parseFloat(item.rate);
      if (isNaN(pct)) return;
      var sign = pct >= 0 ? '+' : '';
      el.textContent = sign + pct.toFixed(2) + '%';
      el.className = 'idx-val ' + (pct >= 0 ? 'up' : 'down');
    });
  } catch(e) {
    console.log('矛搂聙矛聢聵 毛隆聹毛聰漏 矛聵陇毛楼聵:', e.message);
  }
}
loadMarketIndices();
</script>
</body>
</html>
