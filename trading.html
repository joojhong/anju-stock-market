<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">  <meta name="apple-mobile-web-app-capable" content="yes">  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>거래입력 – 안주주식마켓</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #333; padding-bottom: 72px; }
.header { background: #1a1f2e; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 18px; font-weight: 700; flex: 1; }
.header a { color: rgba(255,255,255,0.65); font-size: 13px; text-decoration: none; padding: 4px 8px; border-radius: 6px; background: rgba(255,255,255,0.1); }
.section { padding: 14px 16px; }
.form-card { background: white; border-radius: 14px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 12px; }
.tab-bar { display: flex; border-bottom: 1px solid #eee; margin-bottom: 14px; }
.tab-btn { flex: 1; padding: 10px; background: none; border: none; font-size: 13px; font-weight: 600; color: #999; cursor: pointer; }
.tab-btn.active { color: #1a1f2e; border-bottom-color: #1a1f2e; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.trade-type-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.trade-type-btn { padding: 10px; border: 2px solid #e0e0e0; border-radius: 10px; background: white; font-size: 14px; font-weight: 600; cursor: pointer; }
.trade-type-btn.buy.active { background: #fff0f0; border-color: #e53935; color: #e53935; }
.trade-type-btn.sell.active { background: #f0f6ff; border-color: #3498db; color: #3498db; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 6px; }
.form-group select, .form-group input { width: 100%; padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 14px; background: white; appearance: auto; }
.form-group select:focus, .form-group input:focus { outline: none; border-color: #1a1f2e; }
.save-btn { width: 100%; padding: 14px; background: #1a1f2e; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; }
.save-btn:active { opacity: 0.85; }
.trade-list { display: flex; flex-direction: column; gap: 10px; }
.trade-item { background: white; border-radius: 12px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.trade-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.trade-stock { font-size: 15px; font-weight: 700; }
.trade-type-badge { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
.trade-type-badge.buy { background: #fff0f0; color: #e53935; }
.trade-type-badge.sell { background: #f0f6ff; color: #3498db; }
.trade-info { font-size: 12px; color: #666; display: flex; gap: 10px; flex-wrap: wrap; }
.trade-amount { font-size: 14px; font-weight: 700; color: #1a1f2e; margin-top: 6px; }
.loading { text-align: center; color: #999; padding: 30px; font-size: 14px; }
.empty { text-align: center; color: #bbb; padding: 40px; }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.popup-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; align-items: center; justify-content: center; }
.popup-overlay.show { display: flex; }
.popup-box { background: white; border-radius: 16px; padding: 28px 24px; text-align: center; max-width: 300px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
.popup-icon { font-size: 48px; margin-bottom: 12px; }
.popup-title { font-size: 18px; font-weight: 700; color: #1a1f2e; margin-bottom: 8px; }
.popup-msg { font-size: 14px; color: #666; }
</style>
</head>
<body>
<div class="header">
  <h1>거래 입력</h1>
  <a href="index.html">홈</a>
</div>
<div class="section">
  <div class="form-card">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('form')">거래 입력</button>
      <button class="tab-btn" onclick="switchTab('list')">거래 목록</button>
    </div>
    <div id="tabForm" class="tab-content active">
      <div class="trade-type-row">
        <button class="trade-type-btn buy active" onclick="setTradeType('buy')">매수</button>
        <button class="trade-type-btn sell" onclick="setTradeType('sell')">매도</button>
      </div>
      <div class="form-group">
        <label>사용자</label>
        <select id="selUser"><option value="">로딩 중...</option></select>
      </div>
      <div class="form-group">
        <label>금융기관</label>
        <select id="selInst"><option value="">로딩 중...</option></select>
      </div>
      <div class="form-group">
        <label>상품</label>
        <select id="selProd"><option value="">로딩 중...</option></select>
      </div>
      <div class="form-group">
        <label>종목</label>
        <select id="selStock"><option value="">로딩 중...</option></select>
      </div>
      <div class="form-group">
        <label>수량</label>
        <input type="number" id="inpQty" placeholder="0" min="1">
      </div>
      <div class="form-group">
        <label>단가 (원)</label>
        <input type="number" id="inpPrice" placeholder="0" min="0">
      </div>
      <button class="save-btn" onclick="submitTrade()">거래 저장</button>
    </div>
    <div id="tabList" class="tab-content">
      <div id="tradeListContent" class="trade-list">
        <div class="loading">&#x23F3; 로딩 중...</div>
      </div>
    </div>
  </div>
</div>

<div class="popup-overlay" id="popupOverlay">
  <div class="popup-box">
    <div class="popup-icon">&#x2705;</div>
    <div class="popup-title">등록 완료!</div>
    <div class="popup-msg">거래가 성공적으로 등록되었습니다.</div>
  </div>
</div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbw42bSbW1U2SUfta-d1cjYDD5PZG6q4JeIy5yYePRKLXTWU78ueprlss2SjHSK3GpVz6g/exec';
let tradeType = 'buy';
let accountRows = [];

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='form'&&i===0)||(tab==='list'&&i===1)));
  document.getElementById('tabForm').classList.toggle('active', tab==='form');
  document.getElementById('tabList').classList.toggle('active', tab==='list');
  if (tab === 'list') loadTradeList();
}

function setTradeType(t) {
  tradeType = t;
  document.querySelectorAll('.trade-type-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.trade-type-btn.' + t).classList.add('active');
}

// Populate select from object {id: name} format
function populateSelectFromObj(id, obj) {
  const sel = document.getElementById(id);
  sel.innerHTML = '<option value="">선택하세요</option>';
  Object.entries(obj).forEach(([k, v]) => {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = v;
    sel.appendChild(opt);
  });
}

async function loadLabels() {
  try {
    const [labRes, accRes] = await Promise.all([
      fetch(GAS + '?action=api&type=labels'),
      fetch(GAS + '?action=readSheet&sheet=계좌')
    ]);
    const lab = await labRes.json();
    const acc = await accRes.json();

    // Account data: [[header], [C001,A001,B001,D003], ...]
    accountRows = (acc.data || []).slice(1); // skip header row

    populateSelectFromObj('selUser', lab['사용자'] || {});
    populateSelectFromObj('selInst', lab['금융기관'] || {});
    populateSelectFromObj('selProd', lab['상품'] || {});
    populateSelectFromObj('selStock', lab['종목'] || {});
  } catch(e) {
    console.error('라벨 로드 오류:', e);
  }
}

// accountRows: [[C001,A001,B001,D003], [C002,A001,B002,D001], ...]
// cols: 0=계좌ID, 1=사용자ID, 2=금융기관ID, 3=상품ID
function findAccountId(userId, instId, prodId) {
  const found = accountRows.find(r => r[1] === userId && r[2] === instId && r[3] === prodId);
  return found ? found[0] : null;
}

async function submitTrade() {
  const userId = document.getElementById('selUser').value;
  const instId = document.getElementById('selInst').value;
  const prodId = document.getElementById('selProd').value;
  const stockId = document.getElementById('selStock').value;
  const qty = document.getElementById('inpQty').value;
  const price = document.getElementById('inpPrice').value;

  if (!userId || !instId || !prodId || !stockId || !qty || !price) {
    alert('모든 항목을 입력해주세요.');
    return;
  }

  const accountId = findAccountId(userId, instId, prodId);
  if (!accountId) {
    alert('해당 사용자/기관/상품 조합의 계좌가 없습니다.');
    return;
  }

  const btn = document.querySelector('.save-btn');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  try {
    const body = {
      action: 'addTrading',
      '사용자ID': userId,
      '금융기관ID': accountId,
      '종목코드': stockId,
      '거래유형': tradeType === 'buy' ? '매수' : '매도',
      '수량': Number(qty),
      '단가': Number(price)
    };

    const res = await fetch(GAS, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(body)
    });
    const data = await res.json();

    if (data.result === 'success' || data.success || data.id) {
      showPopup();
      resetForm();
      setTimeout(() => {
        hidePopup();
        switchTab('list');
      }, 1500);
    } else {
      alert('저장 실패: ' + (data.message || JSON.stringify(data)));
    }
  } catch(e) {
    alert('오류 발생: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '거래 저장';
  }
}

function resetForm() {
  document.getElementById('selUser').value = '';
  document.getElementById('selInst').value = '';
  document.getElementById('selProd').value = '';
  document.getElementById('selStock').value = '';
  document.getElementById('inpQty').value = '';
  document.getElementById('inpPrice').value = '';
  setTradeType('buy');
}

function showPopup() { document.getElementById('popupOverlay').classList.add('show'); }
function hidePopup() { document.getElementById('popupOverlay').classList.remove('show'); }

async function loadTradeList() {
  const el = document.getElementById('tradeListContent');
  el.innerHTML = '<div class="loading">&#x23F3; 거래 내역 로딩 중...</div>';
  try {
    const res = await fetch(GAS + '?action=readSheet&sheet=거래내역');
    const data = await res.json();
    const rows = (data.data || []);
    if (rows.length <= 1) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">&#x1F4CB;</div>거래 내역이 없습니다.</div>';
      return;
    }
    const headers = rows[0];
    const dataRows = rows.slice(1).reverse();

    const ci = (name) => {
      const idx = headers.indexOf(name);
      return idx !== -1 ? idx : -1;
    };

    // Column indices
    const iId = ci('거래ID');
    const iDate = ci('거래일자');
    const iUser = ci('사용자ID');
    const iAcc = ci('계좌아이디');
    const iStock = ci('종목코드');
    const iType = ci('거래유형');
    const iQty = ci('수량');
    const iPrice = ci('단가');

    el.innerHTML = dataRows.map(r => {
      const type = iType >= 0 ? (r[iType] || '') : '';
      const isBuy = type === '매수' || type === 'buy';
      const qty = Number(iQty >= 0 ? (r[iQty] || 0) : 0);
      const price = Number(iPrice >= 0 ? (r[iPrice] || 0) : 0);
      const total = qty * price;
      const stock = iStock >= 0 ? (r[iStock] || '-') : '-';
      const date = iDate >= 0 ? (r[iDate] || '') : '';
      return '<div class="trade-item">' +
        '<div class="trade-header">' +
          '<span class="trade-stock">' + stock + '</span>' +
          '<span class="trade-type-badge ' + (isBuy ? 'buy' : 'sell') + '">' + type + '</span>' +
        '</div>' +
        '<div class="trade-info">' +
          '<span>' + date + '</span>' +
          '<span>' + qty.toLocaleString() + '주 @ ' + price.toLocaleString() + '원</span>' +
        '</div>' +
        '<div class="trade-amount">' + total.toLocaleString() + '원</div>' +
      '</div>';
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">&#x26A0;&#xFE0F;</div>로딩 실패: ' + e.message + '</div>';
  }
}

loadLabels();
</script>
</body>
</html>
