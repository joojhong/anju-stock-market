<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>거래입력 - 안주주식마켓</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #333; padding-bottom: 72px; }
.header { background: #1a1f2e; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 18px; font-weight: 700; flex: 1; }
.header a { color: rgba(255,255,255,0.65); font-size: 13px; text-decoration: none; padding: 4px 8px; border-radius: 6px; background: rgba(255,255,255,0.1); }
.section { padding: 14px 16px; }
.form-card { background: white; border-radius: 14px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 12px; }
.tab-bar { display: flex; border-bottom: 1px solid #eee; margin-bottom: 14px; }
.tab-btn { flex: 1; padding: 10px; background: none; border: none; font-size: 13px; font-weight: 600; color: #999; cursor: pointer; border-bottom: 2px solid transparent; }
.tab-btn.active { color: #1a1f2e; border-bottom-color: #1a1f2e; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.trade-type-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.trade-type-btn { padding: 11px; border: 2px solid #ddd; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; background: white; color: #888; text-align: center; }
.trade-type-btn.buy.active { background: #fef0f0; border-color: #e74c3c; color: #e74c3c; }
.trade-type-btn.sell.active { background: #f0f6ff; border-color: #3498db; color: #3498db; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; color: #888; font-weight: 600; margin-bottom: 5px; }
.form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; background: white; color: #333; appearance: none; -webkit-appearance: none; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: #1a1f2e; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.calc-row { background: #f8f9fa; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
.calc-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.calc-value { font-size: 18px; font-weight: 800; color: #1a1f2e; }
.btn-submit { width: 100%; padding: 14px; background: #1a1f2e; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
.btn-submit:disabled { opacity: 0.6; }
.trade-item { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid #f5f5f5; }
.trade-item:last-child { border-bottom: none; }
.trade-left .trade-stock { font-size: 14px; font-weight: 600; }
.trade-left .trade-meta { font-size: 11px; color: #aaa; margin-top: 2px; }
.trade-right { text-align: right; }
.trade-right .trade-amount { font-size: 15px; font-weight: 700; }
.trade-right .trade-detail { font-size: 11px; color: #aaa; margin-top: 2px; }
.up { color: #e74c3c; }
.down { color: #3498db; }
.loading { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
.err-box { padding: 16px; text-align: center; color: #e74c3c; font-size: 13px; background: #fff0f0; border-radius: 8px; }
.toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid #e8eaed; display: grid; grid-template-columns: repeat(5, 1fr); z-index: 100; }
nav a { display: flex; flex-direction: column; align-items: center; padding: 9px 0 7px; text-decoration: none; color: #80868b; font-size: 10px; gap: 2px; }
nav a.active { color: #1a1f2e; font-weight: 700; }
nav a .ic { font-size: 21px; }
</style>
</head>
<body>
<div class="header">
  <h1>&#x270F;&#xFE0F; 거래입력</h1>
  <a href="index.html">&#x2190; 홈</a>
</div>

<div class="section">
  <div class="form-card">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('form')">&#x2795; 신규 거래</button>
      <button class="tab-btn" onclick="switchTab('list')">&#x1F4CB; 거래 목록</button>
    </div>

    <div id="tabForm" class="tab-content active">
      <div class="trade-type-row">
        <button class="trade-type-btn buy active" id="btnBuy" onclick="setType('매수')">&#x1F534; 매수</button>
        <button class="trade-type-btn sell" id="btnSell" onclick="setType('매도')">&#x1F535; 매도</button>
      </div>
      <div class="form-group">
        <label>&#x1F4C5; 거래일</label>
        <input type="date" id="fDate">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>&#x1F464; 사용자</label>
          <select id="fUser"><option value="">선택</option></select>
        </div>
        <div class="form-group">
          <label>&#x1F3E6; 금융기관</label>
          <select id="fInst"><option value="">선택</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>&#x1F4E6; 상품</label>
          <select id="fProd"><option value="">선택</option></select>
        </div>
        <div class="form-group">
          <label>&#x1F4C8; 종목</label>
          <select id="fStock"><option value="">선택</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>&#x1F522; 수량 (주)</label>
          <input type="number" id="fQty" placeholder="0" min="0" oninput="calcTotal()">
        </div>
        <div class="form-group">
          <label>&#x1F4B0; 단가 (원)</label>
          <input type="number" id="fPrice" placeholder="0" min="0" oninput="calcTotal()">
        </div>
      </div>

      <div class="calc-row">
        <div class="calc-label">&#x1F4B5; 거래 금액</div>
        <div class="calc-value" id="calcTotal">&#x20A9;0</div>
      </div>
      <button class="btn-submit" id="btnSubmit" onclick="submitTrade()">&#x2705; 거래 저장</button>
    </div>

    <div id="tabList" class="tab-content">
      <div id="tradeListContent"><div class="loading">&#x23F3; 데이터 불러오는 중...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav>
  <a href="index.html"><span class="ic">&#x1F4CA;</span>통계</a>
  <a href="trading.html" class="active"><span class="ic">&#x270F;&#xFE0F;</span>거래입력</a>
  <a href="history.html"><span class="ic">&#x1F4C8;</span>히스토리</a>
  <a href="setting.html"><span class="ic">&#x2699;&#xFE0F;</span>설정</a>
  <a href="snapshot.html"><span class="ic">&#x1F4F7;</span>스냅샷</a>
</nav>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbw42bSbW1U2SUfta-d1cjYDD5PZG6q4JeIy5yYePRKLXTWU78ueprlss2SjHSK3GpVz6g/exec';
let labelsMap = {};
let tradeType = '매수';
let listLoaded = false;

function num(n) { return Math.round(n).toLocaleString('ko-KR'); }

function setToday() {
  const d = new Date();
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  document.getElementById('fDate').value = y+'-'+m+'-'+day;
}

function setType(t) {
  tradeType = t;
  document.getElementById('btnBuy').classList.toggle('active', t==='매수');
  document.getElementById('btnSell').classList.toggle('active', t==='매도');
}

function calcTotal() {
  const qty = parseFloat(document.getElementById('fQty').value)||0;
  const price = parseFloat(document.getElementById('fPrice').value)||0;
  document.getElementById('calcTotal').textContent = '\u20A9'+num(qty*price);
}

function fillSel(id, map) {
  const sel = document.getElementById(id);
  sel.innerHTML = '<option value="">선택</option>';
  Object.entries(map).forEach(([v,l]) => {
    const o = document.createElement('option');
    o.value=v; o.textContent=l; sel.appendChild(o);
  });
}

async function loadLabels() {
  try {
    const res = await fetch(GAS+'?action=api&type=labels');
    labelsMap = await res.json();
    fillSel('fUser', labelsMap['사용자']||{});
    fillSel('fInst', labelsMap['금융기관']||{});
    fillSel('fProd', labelsMap['상품']||{});
    fillSel('fStock', labelsMap['종목']||{});
  } catch(e) { showToast('레이블 로드 실패: '+e.message, true); }
}

async function loadTradeList() {
  const el = document.getElementById('tradeListContent');
  el.innerHTML = '<div class="loading">\u23F3 거래 내역 불러오는 중...</div>';
  try {
    const res = await fetch(GAS+'?action=api&type=trading');
    const text = await res.text();
    if (!text || text.length === 0 || text.startsWith('<')) {
      el.innerHTML='<div class="loading">\uD83D\uDCEB \uAC70\uB798 \uB0B4\uC5ED\uC774 \uC5C6\uC2B5\uB2C8\uB2E4</div>'; return;
    }
    const list = JSON.parse(text);
    if (!list||list.length===0) { el.innerHTML='<div class="loading">\uD83D\uDCEB 거래 내역이 없습니다</div>'; return; }
    const sorted = [...list].sort((a,b)=>(b['날짜']||'').localeCompare(a['날짜']||''));
    el.innerHTML = sorted.map(t => {
      const isBuy = (t['거래유형']||'')==='매수';
      const sn = (labelsMap['종목']||{})[t['종목코드']||'']||t['종목코드']||'-';
      const un = (labelsMap['사용자']||{})[t['사용자ID']||'']||t['사용자ID']||'-';
      const inn = (labelsMap['금융기관']||{})[t['금융기관ID']||'']||t['금융기관ID']||'-';
      const qty=t['수량']||0, price=t['단가']||0, amt=t['금액']||(qty*price);
      const date=(t['날짜']||'').replace(/\//g,'.');
      return '<div class="trade-item"><div class="trade-left"><div class="trade-stock '+(isBuy?'up':'down')+'">'+sn+'</div><div class="trade-meta">'+date+' | '+un+' | '+inn+'</div></div><div class="trade-right"><div class="trade-amount '+(isBuy?'up':'down')+'">\u20A9'+num(amt)+'</div><div class="trade-detail">'+num(qty)+'\uC8FC \xD7 \u20A9'+num(price)+'</div></div></div>';
    }).join('');
  } catch(e) { el.innerHTML='<div class="err-box">\u274C 로드 실패: '+e.message+'</div>'; }
}

async function submitTrade() {
  const v = {
    fDate: document.getElementById('fDate').value,
    fUser: document.getElementById('fUser').value,
    fInst: document.getElementById('fInst').value,
    fProd: document.getElementById('fProd').value,
    fStock: document.getElementById('fStock').value,
    fQty: document.getElementById('fQty').value,
    fPrice: document.getElementById('fPrice').value,
  };
  if (!v.fDate||!v.fUser||!v.fInst||!v.fProd||!v.fStock||!v.fQty||!v.fPrice) {
    showToast('\u26A0\uFE0F 모든 필수 항목을 입력해주세요', true); return;
  }
  const btn = document.getElementById('btnSubmit');
  btn.textContent='\u23F3 저장 중...'; btn.disabled=true;
  try {
    const res = await fetch(GAS, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        action:'add', type:'trading',
        '날짜': v.fDate.replace(/-/g,'/'),
        '사용자ID': v.fUser, '금융기관ID': v.fInst, '상품ID': v.fProd, '종목코드': v.fStock,
        '거래유형': tradeType,
        '수량': parseInt(v.fQty), '단가': parseInt(v.fPrice),
        '금액': parseInt(v.fQty)*parseInt(v.fPrice)
      })
    });
    const r = await res.json();
    if (r.result==='success'||r.status==='ok'||r.ok) {
      showToast('\u2705 거래가 저장되었습니다!');
      setToday();
      ['fUser','fInst','fProd','fStock','fQty','fPrice'].forEach(id=>{ document.getElementById(id).value=''; }).filter(id => id !== );
      document.getElementById('calcTotal').textContent='\u20A90';
      listLoaded=false;
    } else { showToast('\u274C 저장 실패: '+(r.message||'오류'), true); }
  } catch(e) { showToast('\u274C 저장 실패: '+e.message, true); }
  finally { btn.textContent='\u2705 거래 저장'; btn.disabled=false; }
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='form')||(i===1&&tab==='list')));
  document.getElementById('tabForm').classList.toggle('active', tab==='form');
  document.getElementById('tabList').classList.toggle('active', tab==='list');
  if (tab==='list'&&!listLoaded) { listLoaded=true; loadTradeList(); }
}

function showToast(msg, isErr) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=isErr?'#e74c3c':'#1a1f2e';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000);
}

setToday(); loadLabels();
</script>
</body>
</html>
