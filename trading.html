<!DOCTYPE html>
<html lang="ko">
<head>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #333; padding-bottom: 72px; }
.header { background: #1a1f2e; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 18px; font-weight: 700; flex: 1; }
.header a { color: rgba(255,255,255,0.65); font-size: 13px; text-decoration: none; padding: 4px 8px; border-radius: 6px; background: rgba(255,255,255,0.1); }
.section { padding: 14px 16px; }
.form-card { background: white; border-radius: 14px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 12px; }
.tab-bar { display: flex; border-bottom: 1px solid #eee; margin-bottom: 14px; }
.tab-btn { flex: 1; padding: 10px; background: none; border: none; font-size: 13px; font-weight: 600; color: #999; cursor: pointer; border-bottom: 2px solid transparent; }
.tab-btn.active { color: #1a1f2e; border-bottom-color: #1a1f2e; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.trade-type-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.trade-type-btn { padding: 11px; border: 2px solid #ddd; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; background: white; color: #888; text-align: center; }
.trade-type-btn.buy.active { background: #fef0f0; border-color: #e74c3c; color: #e74c3c; }
.trade-type-btn.sell.active { background: #f0f6ff; border-color: #3498db; color: #3498db; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; color: #888; font-weight: 600; margin-bottom: 5px; }
.form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; background: white; color: #333; appearance: none; -webkit-appearance: none; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: #1a1f2e; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.calc-row { background: #f8f9fa; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
.calc-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.calc-value { font-size: 18px; font-weight: 800; color: #1a1f2e; }
.btn-submit { width: 100%; padding: 14px; background: #1a1f2e; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
.btn-submit:disabled { opacity: 0.6; }
.filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.filter-btn { padding: 6px 12px; border: 1.5px solid #ddd; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; background: white; color: #888; }
.filter-btn.active { background: #1a1f2e; border-color: #1a1f2e; color: white; }
.filter-btn.buy-filter.active { background: #fef0f0; border-color: #e74c3c; color: #e74c3c; }
.filter-btn.sell-filter.active { background: #f0f6ff; border-color: #3498db; color: #3498db; }
.filter-select { flex: 1; min-width: 100px; padding: 6px 10px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 12px; background: white; color: #333; appearance: none; -webkit-appearance: none; }
.filter-select:focus { outline: none; border-color: #1a1f2e; }
.trade-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 13px 0; border-bottom: 1px solid #f5f5f5; }
.trade-item:last-child { border-bottom: none; }
.trade-left .trade-stock { font-size: 14px; font-weight: 600; }
.trade-left .trade-meta { font-size: 11px; color: #aaa; margin-top: 2px; }
.trade-right { text-align: right; }
.trade-right .trade-amount { font-size: 15px; font-weight: 700; }
.trade-right .trade-detail { font-size: 11px; color: #aaa; margin-top: 2px; }
.trade-done-badge { display: inline-block; font-size: 10px; font-weight: 700; color: #27ae60; background: #e8f8f0; border-radius: 6px; padding: 2px 7px; margin-top: 4px; }
.up { color: #e74c3c; }
.down { color: #3498db; }
.loading { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
.err-box { padding: 16px; text-align: center; color: #e74c3c; font-size: 13px; background: #fff0f0; border-radius: 8px; }
.toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
.trade-count { font-size: 11px; color: #888; margin-bottom: 8px; }
nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1f2e; border-top: 1px solid rgba(255,255,255,0.1); display: grid; grid-template-columns: repeat(5, 1fr); z-index: 100; }
nav a { display: flex; flex-direction: column; align-items: center; padding: 9px 0 7px; text-decoration: none; color: rgba(255,255,255,0.6); font-size: 10px; gap: 2px; }
nav a.active { color: white; font-weight: 700; }
nav a .ic { font-size: 21px; }
</style>
</head>
<body>
<div class="header">
  <h1>&#x270F;&#xFE0F; ÍĪįŽěėžěÖŽ†•</h1>
  <a href="index.html">&#x2190; Ūôą</a>
</div>

<div class="section">
  <div class="form-card">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('form')">&#x2795; žč†Í∑ú ÍĪįŽěė</button>
      <button class="tab-btn" onclick="switchTab('list')">&#x1F4CB; ÍĪįŽěė Ž™©Ž°Ě</button>
    </div>

    <div id="tabForm" class="tab-content active">
      <div class="trade-type-row">
        <button class="trade-type-btn buy active" id="btnBuy" onclick="setType('Žß§žąė')">&#x1F534; Žß§žąė</button>
        <button class="trade-type-btn sell" id="btnSell" onclick="setType('Žß§ŽŹĄ')">&#x1F535; Žß§ŽŹĄ</button>
      </div>
      <div class="form-group">
        <label>&#x1F4C5; ÍĪįŽěėžĚľ</label>
        <input type="date" id="fDate">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>&#x1F464; žā¨žö©žěź</label>
          <select id="fUser"><option value="">žĄ†ŪÉĚ</option></select>
        </div>
        <div class="form-group">
          <label>&#x1F3E6; ÍłąžúĶÍłįÍīÄ</label>
          <select id="fInst"><option value="">žĄ†ŪÉĚ</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>&#x1F4E6; žÉĀŪíą</label>
          <select id="fProd"><option value="">žĄ†ŪÉĚ</option></select>
        </div>
        <div class="form-group">
          <label>&#x1F4C8; žĘÖŽ™©</label>
          <select id="fStock"><option value="">žĄ†ŪÉĚ</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>&#x1F522; žąėŽüČ (ž£ľ)</label>
          <input type="number" id="fQty" placeholder="0" min="0" oninput="calcTotal()">
        </div>
        <div class="form-group">
          <label>&#x1F4B0; Žč®ÍįÄ (žõź)</label>
          <input type="number" id="fPrice" placeholder="0" min="0" oninput="calcTotal()">
        </div>
      </div>

      <div class="calc-row">
        <div class="calc-label">&#x1F4B5; ÍĪįŽěė Íłąžē°</div>
        <div class="calc-value" id="calcTotal">&#x20A9;0</div>
      </div>
      <button class="btn-submit" id="btnSubmit" onclick="submitTrade()">&#x2705; ÍĪįŽěė ž†Äžě•</button>
    </div>

    <div id="tabList" class="tab-content">
      <div class="filter-row">
        <button class="filter-btn active" id="filterAll" onclick="setListFilter('all')">ž†Ąž≤ī</button>
        <button class="filter-btn buy-filter" id="filterBuy" onclick="setListFilter('Žß§žąė')">&#x1F534; Žß§žąė</button>
        <button class="filter-btn sell-filter" id="filterSell" onclick="setListFilter('Žß§ŽŹĄ')">&#x1F535; Žß§ŽŹĄ</button>
        <select class="filter-select" id="filterUser" onchange="applyFilters()">
          <option value="">ž†Ąž≤ī žā¨žö©žěź</option>
        </select>
        <select class="filter-select" id="filterInst" onchange="applyFilters()">
          <option value="">ž†Ąž≤ī ÍłąžúĶÍłįÍīÄ</option>
        </select>
        <select class="filter-select" id="filterProd" onchange="applyFilters()">
          <option value="">ž†Ąž≤ī žÉĀŪíą</option>
        </select>
        <select class="filter-select" id="filterStock" onchange="applyFilters()">
          <option value="">ž†Ąž≤ī žĘÖŽ™©</option>
        </select>
      </div>
      <div class="trade-count" id="tradeCount"></div>
      <div id="tradeListContent"><div class="loading">&#x23F3; ŽćįžĚīŪĄį Ž∂ąŽü¨žė§ŽäĒ ž§Ď...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav>
  <a href="index.html"><span class="ic">&#x1F4CA;</span>ŪÜĶÍ≥Ą</a>
  <a href="trading.html" class="active"><span class="ic">&#x270F;&#xFE0F;</span>ÍĪįŽěėžěÖŽ†•</a>
  <a href="history.html"><span class="ic">&#x1F4C8;</span>Ūěąžä§ŪÜ†Ž¶¨</a>
  <a href="setting.html"><span class="ic">&#x2699;&#xFE0F;</span>žĄ§ž†ē</a>
  <a href="snapshot.html"><span class="ic">&#x1F4F7;</span>žä§ŽÉÖžÉ∑</a>
</nav>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbw42bSbW1U2SUfta-d1cjYDD5PZG6q4JeIy5yYePRKLXTWU78ueprlss2SjHSK3GpVz6g/exec';
let labelsMap = {};
let tradeType = 'Žß§žąė';
let listLoaded = false;
let allTradeList = [];
let listFilter = 'all';

function num(n) { return Math.round(n).toLocaleString('ko-KR'); }

function setToday() {
  const d = new Date();
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  document.getElementById('fDate').value = y+'-'+m+'-'+day;
}

function setType(t) {
  tradeType = t;
  document.getElementById('btnBuy').classList.toggle('active', t==='Žß§žąė');
  document.getElementById('btnSell').classList.toggle('active', t==='Žß§ŽŹĄ');
}

function calcTotal() {
  const qty = parseFloat(document.getElementById('fQty').value)||0;
  const price = parseFloat(document.getElementById('fPrice').value)||0;
  document.getElementById('calcTotal').textContent = '\u20A9'+num(qty*price);
}

function fillSel(id, map) {
  const sel = document.getElementById(id);
  sel.innerHTML = '<option value="">žĄ†ŪÉĚ</option>';
  Object.entries(map).forEach(([v,l]) => {
    const o = document.createElement('option');
    o.value=v; o.textContent=l; sel.appendChild(o);
  });
}

function fillFilterSel(id, map, placeholder) {
  const sel = document.getElementById(id);
  if (!sel) return;
  sel.innerHTML = '<option value="">' + placeholder + '</option>';
  Object.entries(map).forEach(([v,l]) => {
    const o = document.createElement('option');
    o.value=v; o.textContent=l; sel.appendChild(o);
  });
}

async function loadLabels() {
  try {
    const res = await fetch(GAS+'?action=api&type=labels');
    const text = await res.text();
    if (text && !text.startsWith('<')) {
      labelsMap = JSON.parse(text);
    }
  } catch(e) { showToast('Ž†ąžĚīŽłĒ Ž°úŽďú žč§ŪĆ®: '+e.message, true); }
  fillSel('fUser', labelsMap['žā¨žö©žěź']||{});
  fillSel('fInst', labelsMap['ÍłąžúĶÍłįÍīÄ']||{});
  fillSel('fProd', labelsMap['žÉĀŪíą']||{});
  fillSel('fStock', labelsMap['žĘÖŽ™©']||{});
  fillFilterSel('filterUser', labelsMap['žā¨žö©žěź']||{}, 'ž†Ąž≤ī žā¨žö©žěź');
  fillFilterSel('filterInst', labelsMap['ÍłąžúĶÍłįÍīÄ']||{}, 'ž†Ąž≤ī ÍłąžúĶÍłįÍīÄ');
  fillFilterSel('filterProd', labelsMap['žÉĀŪíą']||{}, 'ž†Ąž≤ī žÉĀŪíą');
  fillFilterSel('filterStock', labelsMap['žĘÖŽ™©']||{}, 'ž†Ąž≤ī žĘÖŽ™©');
}

function setListFilter(type) {
  listFilter = type;
  document.getElementById('filterAll').classList.toggle('active', type==='all');
  document.getElementById('filterBuy').classList.toggle('active', type==='Žß§žąė');
  document.getElementById('filterSell').classList.toggle('active', type==='Žß§ŽŹĄ');
  applyFilters();
}

function applyFilters() {
  const userF = document.getElementById('filterUser').value;
  const instF = document.getElementById('filterInst').value;
  const prodF = document.getElementById('filterProd').value;
  const stockF = document.getElementById('filterStock').value;

  let filtered = allTradeList.filter(t => {
    if (listFilter !== 'all' && (t['ÍĪįŽěėžú†Ūėē']||'') !== listFilter) return false;
    if (userF && t['žā¨žö©žěźID'] !== userF) return false;
    if (instF && t['ÍłąžúĶÍłįÍīÄID'] !== instF) return false;
    if (prodF && t['žÉĀŪíąID'] !== prodF) return false;
    if (stockF && t['žĘÖŽ™©žĹĒŽďú'] !== stockF) return false;
    return true;
  });

  renderTradeList(filtered);
}

function renderTradeList(list) {
  const el = document.getElementById('tradeListContent');
  const countEl = document.getElementById('tradeCount');

  if (!list || list.length === 0) {
    el.innerHTML = '<div class="loading">&#x1F4EB; ÍĪįŽěė Žāīžó≠žĚī žóÜžäĶŽčąŽč§</div>';
    if (countEl) countEl.textContent = '';
    return;
  }

  if (countEl) countEl.textContent = 'žīĚ ' + list.length + 'ÍĪī';

  const sorted = [...list].sort((a,b)=>(b['Žā†žßú']||'').localeCompare(a['Žā†žßú']||''));
  el.innerHTML = sorted.map(t => {
    const isBuy = (t['ÍĪįŽěėžú†Ūėē']||'')==='Žß§žąė';
    const sn = (labelsMap['žĘÖŽ™©']||{})[t['žĘÖŽ™©žĹĒŽďú']||'']||t['žĘÖŽ™©žĹĒŽďú']||'-';
    const un = (labelsMap['žā¨žö©žěź']||{})[t['žā¨žö©žěźID']||'']||t['žā¨žö©žěźID']||'-';
    const inn = (labelsMap['ÍłąžúĶÍłįÍīÄ']||{})[t['ÍłąžúĶÍłįÍīÄID']||'']||t['ÍłąžúĶÍłįÍīÄID']||'-';
    const pn = (labelsMap['žÉĀŪíą']||{})[t['žÉĀŪíąID']||'']||t['žÉĀŪíąID']||'';
    const qty=t['žąėŽüČ']||0, price=t['Žč®ÍįÄ']||0, amt=t['Íłąžē°']||(qty*price);
    const date=(t['Žā†žßú']||'').replace(/\//g,'.');
    const typeLabel = isBuy ? '&#x1F534; Žß§žąė' : '&#x1F535; Žß§ŽŹĄ';
    return '<div class="trade-item"><div class="trade-left"><div class="trade-stock '+(isBuy?'up':'down')+'">'+sn+'</div><div class="trade-meta">'+date+' | '+typeLabel+' | '+un+' | '+inn+(pn?' | '+pn:'')+'</div><div class="trade-done-badge">&#x2705; ÍĪįŽěėžôĄŽ£Ć</div></div><div class="trade-right"><div class="trade-amount '+(isBuy?'up':'down')+'">&#x20A9;'+num(amt)+'</div><div class="trade-detail">'+num(qty)+'ž£ľ &times; &#x20A9;'+num(price)+'</div></div></div>';
  }).join('');
}

async function loadTradeList() {
  const el = document.getElementById('tradeListContent');
  el.innerHTML = '<div class="loading">&#x23F3; ÍĪįŽěė Žāīžó≠ Ž∂ąŽü¨žė§ŽäĒ ž§Ď...</div>';
  try {
    const res = await fetch(GAS+'?action=api&type=trading');
    const text = await res.text();
    if (!text || text.length === 0 || text.startsWith('<')) {
      allTradeList = [];
      el.innerHTML='<div class="loading">&#x1F4EB; ÍĪįŽěė Žāīžó≠žĚī žóÜžäĶŽčąŽč§</div>';
      return;
    }
    const list = JSON.parse(text);
    allTradeList = list || [];
    applyFilters();
  } catch(e) { el.innerHTML='<div class="err-box">&#x274C; Ž°úŽďú žč§ŪĆ®: '+e.message+'</div>'; }
}

async function submitTrade() {
  const v = {
    fDate: document.getElementById('fDate').value,
    fUser: document.getElementById('fUser').value,
    fInst: document.getElementById('fInst').value,
    fProd: document.getElementById('fProd').value,
    fStock: document.getElementById('fStock').value,
    fQty: document.getElementById('fQty').value,
    fPrice: document.getElementById('fPrice').value,
  };
  if (!v.fDate||!v.fUser||!v.fInst||!v.fProd||!v.fStock||!v.fQty||!v.fPrice) {
    showToast('\u26A0\uFE0F Ž™®Žď† ŪēĄžąė Ūē≠Ž™©žĚĄ žěÖŽ†•Ūēīž£ľžĄłžöĒ', true); return;
  }
  const btn = document.getElementById('btnSubmit');
  btn.textContent='\u23F3 ž†Äžě• ž§Ď...'; btn.disabled=true;
  try {
    const res = await fetch(GAS, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        action:'add', type:'trading',
        'Žā†žßú': v.fDate.replace(/-/g,'/'),
        'žā¨žö©žěźID': v.fUser, 'ÍłąžúĶÍłįÍīÄID': v.fInst, 'žÉĀŪíąID': v.fProd, 'žĘÖŽ™©žĹĒŽďú': v.fStock,
        'ÍĪįŽěėžú†Ūėē': tradeType,
        'žąėŽüČ': parseInt(v.fQty), 'Žč®ÍįÄ': parseInt(v.fPrice),
        'Íłąžē°': parseInt(v.fQty)*parseInt(v.fPrice)
      })
    });
    const r = await res.json();
    if (r.result==='success'||r.status==='ok'||r.ok) {
      showToast('\u2705 ÍĪįŽěėžôĄŽ£Ć! ÍĪįŽěėÍįÄ ž†Äžě•ŽźėžóąžäĶŽčąŽč§.');
      setToday();
      ['fUser','fInst','fProd','fStock','fQty','fPrice'].forEach(id => { document.getElementById(id).value=''; });
      document.getElementById('calcTotal').textContent='&#x20A9;0';
      listLoaded=false; allTradeList=[];
    } else { showToast('\u274C ž†Äžě• žč§ŪĆ®: '+(r.message||'žė§Ž•ė'), true); }
  } catch(e) { showToast('\u274C ž†Äžě• žč§ŪĆ®: '+e.message, true); }
  finally { btn.textContent='\u2705 ÍĪįŽěė ž†Äžě•'; btn.disabled=false; }
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='form')||(i===1&&tab==='list')));
  document.getElementById('tabForm').classList.toggle('active', tab==='form');
  document.getElementById('tabList').classList.toggle('active', tab==='list');
  if (tab==='list'&&!listLoaded) { listLoaded=true; loadTradeList(); }
}

function showToast(msg, isErr) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=isErr?'#e74c3c':'#1a1f2e';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000);
}

setToday(); loadLabels();
</script>
