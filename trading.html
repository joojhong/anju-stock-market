<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">  <meta name="apple-mobile-web-app-capable" content="yes">  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>거래입력 – 안주주식마켓</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #333; padding-bottom: 72px; }
.header { background: #ffffff; color: #1a1f2e; padding: 16px 20px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #eee; }
.header h1 { font-size: 18px; font-weight: 700; flex: 1; }
.header a { color: #666; font-size: 13px; text-decoration: none; padding: 4px 8px; border-radius: 6px; background: rgba(255,255,255,0.1); }
nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #ffffff; border-top: 1px solid #e0e0e0; display: grid; grid-template-columns: repeat(5, 1fr); z-index: 100; }
nav a { display: flex; flex-direction: column; align-items: center; padding: 9px 0 7px; text-decoration: none; color: #999; font-size: 10px; gap: 2px; }
nav a.active { color: #1a1f2e; font-weight: 700; }
nav a .ic { font-size: 21px; }
.section { padding: 14px 16px; }
.form-card { background: white; border-radius: 14px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 12px; }
.tab-bar { display: flex; border-bottom: 1px solid #eee; margin-bottom: 14px; }
.tab-btn { flex: 1; padding: 10px; background: none; border: none; font-size: 13px; font-weight: 600; color: #999; cursor: pointer; }
.tab-btn.active { color: #1a1f2e; border-bottom: 2px solid #1a1f2e; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.trade-type-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.trade-type-btn { padding: 10px; border: 2px solid #e0e0e0; border-radius: 10px; background: white; font-size: 14px; font-weight: 600; cursor: pointer; }
.trade-type-btn.buy.active { background: #fff0f0; border-color: #e53935; color: #e53935; }
.trade-type-btn.sell.active { background: #f0f6ff; border-color: #3498db; color: #3498db; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 6px; }
.form-group select, .form-group input { width: 100%; padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 14px; background: white; appearance: auto; }
.form-group input[type="date"] { -webkit-appearance: none; appearance: none; box-sizing: border-box; max-width: 100%; min-width: 0; display: block; }
.form-group select:focus, .form-group input:focus { outline: none; border-color: #1a1f2e; }
.save-btn { width: 100%; padding: 14px; background: #1a1f2e; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; }
.save-btn:active { opacity: 0.85; }
.trade-list { display: flex; flex-direction: column; gap: 10px; }
.trade-item { background: white; border-radius: 12px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.trade-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.trade-stock { font-size: 15px; font-weight: 700; }
.trade-type-badge { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
.trade-type-badge.buy { background: #fff0f0; color: #e53935; }
.trade-type-badge.sell { background: #f0f6ff; color: #3498db; }
.trade-info { font-size: 12px; color: #666; display: flex; gap: 10px; flex-wrap: wrap; }
.trade-amount { font-size: 14px; font-weight: 700; color: #1a1f2e; margin-top: 6px; }
.trade-account { font-size: 11px; color: #999; margin-top: 3px; }
.loading { text-align: center; color: #999; padding: 30px; font-size: 14px; }
.empty { text-align: center; color: #bbb; padding: 40px; }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.popup-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; align-items: center; justify-content: center; }
.popup-overlay.show { display: flex; }
.popup-box { background: white; border-radius: 16px; padding: 28px 24px; text-align: center; max-width: 300px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
.popup-icon { font-size: 48px; margin-bottom: 12px; }
.popup-title { font-size: 18px; font-weight: 700; color: #1a1f2e; margin-bottom: 8px; }
.popup-msg { font-size: 14px; color: #666; }
.trade-del-wrap { text-align:right; margin-top:6px; }
.btn-del-trade { background:#fff0f0; color:#d32f2f; border:1px solid #ffcdd2; border-radius:6px; font-size:11px; padding:3px 10px; cursor:pointer; }
.btn-del-trade:hover { background:#ffcdd2; }
.del-confirm-overlay { position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:center;justify-content:center; }
.del-confirm-box { background:white;border-radius:14px;padding:24px;margin:20px;max-width:320px;width:100%; }
.del-confirm-box h3 { font-size:16px;font-weight:700;margin-bottom:12px;color:#1a1f2e; }
.del-confirm-box p { font-size:14px;color:#555;margin-bottom:20px;line-height:1.5; }
.del-confirm-btns { display:flex;gap:8px;justify-content:flex-end; }
.del-cancel-btn { padding:8px 16px;border:1px solid #ddd;border-radius:8px;background:white;cursor:pointer;font-size:14px; }
.del-ok-btn { padding:8px 16px;background:#d32f2f;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px; }
</style>
</head>
<body>
<div class="header"><span style="font-size:22px">&#x270F;&#xFE0F;</span><h1>거래 입력</h1><a href="index.html">&#x2190; 홈</a></div>
<div class="section">
<div class="form-card">
<div class="tab-bar">
<button class="tab-btn active" onclick="switchTab('form')">거래 입력</button>
<button class="tab-btn" onclick="switchTab('list')">거래 목록</button>
</div>
<div id="tabForm" class="tab-content active">
<div class="trade-type-row">
<button class="trade-type-btn buy active" onclick="setTradeType('buy')">매수</button>
<button class="trade-type-btn sell" onclick="setTradeType('sell')">매도</button>
</div>
<div class="form-group"><label>날짜</label><input type="date" id="inpDate"></div>
<div class="form-group"><label>사용자</label><select id="selUser"><option value="">선택하세요</option></select></div>
<div class="form-group"><label>금융기관</label><select id="selInst"><option value="">선택하세요</option></select></div>
<div class="form-group"><label>상품</label><select id="selProd"><option value="">선택하세요</option></select></div>
<div class="form-group"><label>종목</label><select id="selStock"><option value="">선택하세요</option></select></div>
<div class="form-group"><label>수량</label><input type="number" id="inpQty" placeholder="0" min="1" oninput="calcAmount()"></div>
<div class="form-group"><label>단가 (원)</label><input type="number" id="inpPrice" placeholder="0" min="0" oninput="calcAmount()"></div>
<div class="form-group"><label>금액 (원)</label><input type="number" id="inpAmount" placeholder="0" readonly style="background:#f8f8f8;color:#1a1f2e;font-weight:700;"></div>
<button class="save-btn" onclick="submitTrade()">거래 저장</button>
</div>
<div id="tabList" class="tab-content">
<div id="tradeListContent" class="trade-list"><div class="loading">&#x23F3; 로딩 중...</div></div>
</div>
</div>
</div>
<div id="popupOverlay" class="popup-overlay">
<div class="popup-box">
<div class="popup-icon" id="popupIcon">&#x2705;</div>
<div class="popup-title" id="popupTitle">저장 완료</div>
<div class="popup-msg" id="popupMsg"></div>
</div>
</div>
<nav>
<a href="index.html"><span class="ic">&#x1F4CA;</span>통계</a>
<a href="trading.html" class="active"><span class="ic">&#x270F;&#xFE0F;</span>거래입력</a>
<a href="history.html"><span class="ic">&#x1F4C8;</span>히스토리</a>
<a href="setting.html"><span class="ic">&#x2699;&#xFE0F;</span>설정</a>
<a href="snapshot.html"><span class="ic">&#x1F5C3;&#xFE0F;</span>스냅샷</a>
</nav>
<script>
const GAS='https://script.google.com/macros/s/AKfycbw42bSbW1U2Sufta-d1cjYDD5PZG6q4JeIy5yYePRKLXTWU78ueprlss2SjHSK3GpVz6g/exec';
const STATIC_BASE='public/data';
var tradeType='buy',labelsCache=null,accountRows=[],stockMap={};
async function fetchJSON(s,g){try{const r=await fetch(s+'?_='+Date.now());if(r.ok){const d=await r.json();if(!d.error)return d;}}catch(e){}return(await fetch(g)).json();}
function getTodayStr(){var k=new Date(new Date().getTime()+9*60*60*1000);return k.toISOString().split('T')[0];}
function switchTab(t){document.getElementById('tabForm').classList.toggle('active',t==='form');document.getElementById('tabList').classList.toggle('active',t==='list');document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='form')||(i===1&&t==='list')));if(t==='list')loadTradeList();}
function setTradeType(t){tradeType=t;document.querySelectorAll('.trade-type-btn').forEach(b=>b.classList.remove('active'));document.querySelector('.trade-type-btn.'+t).classList.add('active');}
function populateSelectFromObj(id,obj){var sel=document.getElementById(id);sel.innerHTML='<option value="">선택하세요</option>';Object.entries(obj).forEach(([k,v])=>{var o=document.createElement('option');o.value=k;o.textContent=v;sel.appendChild(o);});}
function calcAmount(){var q=Number(document.getElementById('inpQty').value)||0,p=Number(document.getElementById('inpPrice').value)||0,el=document.getElementById('inpAmount');if(el)el.value=q*p||'';}
async function initPage(){
  const d=document.getElementById('inpDate');if(d&&!d.value)d.value=getTodayStr();
  try{
    var lab=await fetchJSON(STATIC_BASE+'/labels.json',GAS+'?action=api&type=labels');
    labelsCache=lab;stockMap=lab['종목']||{};
    populateSelectFromObj('selUser',lab['사용자']||{});
    populateSelectFromObj('selInst',lab['금융기관']||{});
    populateSelectFromObj('selProd',lab['상품']||{});
    populateSelectFromObj('selStock',lab['종목']||{});
    try{var a=await fetchJSON(STATIC_BASE+'/accounts.json',GAS+'?action=readSheet&sheet=%EA%B3%84%EC%A2%8C');accountRows=(a.data||[]).slice(1);}catch(e2){}
  }catch(e){console.error(e);}
}
function fmtDate(s){if(!s)return'';var d=new Date(s);if(isNaN(d.getTime()))return String(s).substring(0,10);var k=new Date(d.getTime()+9*60*60*1000);return k.getUTCFullYear()+'-'+String(k.getUTCMonth()+1).padStart(2,'0')+'-'+String(k.getUTCDate()).padStart(2,'0');}
async function loadTradeList(){
  var el=document.getElementById('tradeListContent');
  el.innerHTML='<div class="loading">&#x23F3; 로딩 중...</div>';
  try{
    var data=await fetchJSON(STATIC_BASE+'/tradelist.json',GAS+'?action=readSheet&sheet=거래내역');
    var rows=data.data||[];
    if(rows.length<=1){el.innerHTML='<div class="empty"><div class="empty-icon">&#x1F4ED;</div>거래 내역이 없습니다.</div>';return;}
    var hd=rows[0];
    function ci(n){return hd.indexOf(n);}
    var iD=ci('날짜'),iT=ci('거래유형'),iS=ci('종목코드'),iQ=ci('수량'),iP=ci('다가'),iA=ci('거래금액'),iTid=ci('거래ID'),iAid=ci('계좌ID');
    el.innerHTML='';
    rows.slice(1).reverse().forEach(function(r){
      var typ=iT>=0?(r[iT]||''):'',sid=iS>=0?(r[iS]||''):'';
      var sn=(stockMap&&stockMap[sid])||sid;
      var un='',bn='',pn='';
      if(labelsCache&&accountRows.length>0){var av=iAid>=0?r[iAid]:'',ar=accountRows.find(function(row){return row[2]===av;});if(ar){un=(labelsCache['사용자']&&labelsCache['사용자'][ar[0]])||ar[0]||'';bn=ar[3]||'';pn=ar[4]||'';}}
      var tid=iTid>=0?r[iTid]:'';
      var div=document.createElement('div');div.className='trade-item';
      var inner='<div class="trade-header"><span class="trade-stock">'+sn+'</span><span class="trade-type-badge '+(typ==='매수'?'buy':'sell')+'">'+typ+'</span></div>';
      inner+='<div class="trade-info"><span>'+fmtDate(iD>=0?r[iD]:'')+' </span>';
      if(iQ>=0)inner+='<span>'+(r[iQ]||0)+'주</span>';
      if(iP>=0)inner+='<span>@'+Number(r[iP]||0).toLocaleString()+'원</span>';
      inner+='</div>';
      if(iA>=0)inner+='<div class="trade-amount">&#x20A9;'+Number(r[iA]||0).toLocaleString()+'</div>';
      if(un||bn)inner+='<div class="trade-account">'+[un,bn,pn].filter(Boolean).join(', ')+'</div>';
      div.innerHTML=inner;
      if(tid){var btn=document.createElement('button');btn.className='btn-del-trade';btn.textContent='삭제';btn.dataset.tid=tid;btn.addEventListener('click',function(){confirmDeleteTrade(this.dataset.tid);});var wrap=document.createElement('div');wrap.className='trade-del-wrap';wrap.appendChild(btn);div.appendChild(wrap);}
      el.appendChild(div);
    });
  }catch(e){el.innerHTML='<div class="empty"><div class="empty-icon">&#x26A0;&#xFE0F;</div>로드 실패: '+e.message+'</div>';}
}
function showPopup(i,t,m){document.getElementById('popupIcon').textContent=i;document.getElementById('popupTitle').textContent=t;document.getElementById('popupMsg').textContent=m||'';document.getElementById('popupOverlay').classList.add('show');}
function hidePopup(){document.getElementById('popupOverlay').classList.remove('show');}
function resetForm(){['inpQty','inpPrice','inpAmount'].forEach(id=>document.getElementById(id).value='');['selUser','selInst','selProd','selStock'].forEach(id=>document.getElementById(id).selectedIndex=0);}
async function submitTrade(){
  var d=document.getElementById('inpDate').value||getTodayStr();
  var u=document.getElementById('selUser').value,ins=document.getElementById('selInst').value;
  var pr=document.getElementById('selProd').value,st=document.getElementById('selStock').value;
  var q=Number(document.getElementById('inpQty').value),p=Number(document.getElementById('inpPrice').value),a=Number(document.getElementById('inpAmount').value);
  if(!u||!ins||!pr||!st||!q||!p){alert('모든 항목을 입력해주세요.');return;}
  var body={action:'addTrading','날짜':d,'사용자ID':u,'금융기관ID':ins,'상품ID':pr,'종목코드':st,'거래유형':tradeType==='buy'?'매수':'매도','수량':q,'다가':p,'거래금액':a,'금액':a};
  var res=await fetch(GAS,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)});
  var data=await res.json();
  if(data.result==='success'||data.success||data.id){showPopup('&#x2705;','저장 완료','거래가 저장되었습니다.');resetForm();setTimeout(function(){hidePopup();switchTab('list');},1500);}
  else{alert('저장 실패: '+(data.message||JSON.stringify(data)));}
}
var _delId=null;
function confirmDeleteTrade(id){_delId=id;var o=document.createElement('div');o.className='del-confirm-overlay';o.id='delConfirmOverlay';o.innerHTML='<div class="del-confirm-box"><h3>거래 삭제</h3><p>이 거래 내역을 삭제하시겠습니까?<br>삭제 후 복구할 수 없습니다.</p><div class="del-confirm-btns"><button class="del-cancel-btn" onclick="cancelDeleteTrade()">취소</button><button class="del-ok-btn" onclick="doDeleteTrade()">삭제</button></div></div>';document.body.appendChild(o);}
function cancelDeleteTrade(){var o=document.getElementById('delConfirmOverlay');if(o)o.remove();_delId=null;}
async function doDeleteTrade(){cancelDeleteTrade();if(!_delId)return;var tid=_delId;_delId=null;try{var data=await(await fetch(GAS,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'deleteTrading','거래ID':tid})})).json();if(data.result==='success'||data.success){loadTradeList();}else{alert('삭제 실패: '+(data.message||''));}}catch(e){alert('오류: '+e.message);}}
initPage();
</script>
</body>
</html>
