<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스냅샷 - 안주주식마켓</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #333; padding-bottom: 72px; }
.header { background: #1a1f2e; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 18px; font-weight: 700; flex: 1; }
.header a { color: rgba(255,255,255,0.65); font-size: 13px; text-decoration: none; padding: 4px 8px; border-radius: 6px; background: rgba(255,255,255,0.1); }
.tab-bar { background: white; display: flex; border-bottom: 1px solid #eee; position: sticky; top: 56px; z-index: 99; }
.tab-btn { flex: 1; padding: 12px; background: none; border: none; font-size: 13px; font-weight: 600; color: #999; cursor: pointer; border-bottom: 2px solid transparent; }
.tab-btn.active { color: #1a1f2e; border-bottom-color: #1a1f2e; }
.section { padding: 14px 16px; }
.card { background: white; border-radius: 14px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 12px; }
.card h2 { font-size: 14px; font-weight: 700; color: #1a1f2e; margin-bottom: 14px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; color: #888; font-weight: 600; margin-bottom: 5px; }
.form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; background: white; color: #333; appearance: none; -webkit-appearance: none; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: #1a1f2e; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.rows-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.rows-label { font-size: 11px; color: #888; font-weight: 600; }
.btn-add-row { padding: 5px 12px; background: #f0efff; color: #6c63ff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
.snap-row { display: flex; gap: 6px; align-items: center; padding: 7px 0; border-bottom: 1px solid #f5f5f5; }
.snap-row:last-child { border-bottom: none; }
.snap-row select { padding: 8px 8px; border: 1.5px solid #ddd; border-radius: 7px; font-size: 12px; background: white; min-width: 0; }
.snap-row .sel-stock { flex: 1.6; }
.snap-row .sel-prod { flex: 1; }
.snap-row input[type=number] { flex: 1; padding: 8px 8px; border: 1.5px solid #ddd; border-radius: 7px; font-size: 12px; min-width: 0; }
.snap-row .btn-rm { padding: 7px 10px; background: #fff0f0; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; color: #e74c3c; flex-shrink: 0; }
.total-bar { background: #f8f9fa; border-radius: 8px; padding: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
.total-bar .lbl { font-size: 11px; color: #888; }
.total-bar .val { font-size: 18px; font-weight: 800; color: #1a1f2e; }
.btn-submit { width: 100%; padding: 14px; background: #1a1f2e; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
.btn-submit:disabled { opacity: 0.6; }
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; }
.filter-row select { flex: 1; padding: 9px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 13px; background: white; }
.snap-hist-card { background: white; border-radius: 12px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 10px; }
.snap-date-row { font-size: 13px; font-weight: 700; color: #1a1f2e; margin-bottom: 8px; }
.snap-sub { display: flex; justify-content: space-between; padding: 4px 0; }
.snap-sub .sname { font-size: 12px; color: #555; }
.snap-sub .sprod { font-size: 11px; color: #aaa; }
.snap-sub .samt { font-size: 13px; font-weight: 600; color: #1a1f2e; }
.snap-total-row { display: flex; justify-content: space-between; margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; }
.snap-total-row .tl { font-size: 12px; font-weight: 700; color: #888; }
.snap-total-row .tv { font-size: 16px; font-weight: 800; color: #1a1f2e; }
.loading { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
.err-box { padding: 16px; text-align: center; color: #e74c3c; font-size: 13px; background: #fff0f0; border-radius: 8px; }
.toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid #e8eaed; display: grid; grid-template-columns: repeat(5, 1fr); z-index: 100; }
nav a { display: flex; flex-direction: column; align-items: center; padding: 9px 0 7px; text-decoration: none; color: #80868b; font-size: 10px; gap: 2px; }
nav a.active { color: #1a1f2e; font-weight: 700; }
nav a .ic { font-size: 21px; }
</style>
</head>
<body>
<div class="header">
  <h1>&#x1F4F7; 스냅샷</h1>
  <a href="index.html">&#x2190; 홈</a>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('input')">&#x1F4F8; 스냅샷 입력</button>
  <button class="tab-btn" onclick="switchTab('history')">&#x1F4CB; 스냅샷 기록</button>
</div>

<div id="inputTab">
  <div class="section">
    <div class="card">
      <h2>&#x1F4F8; 오늘의 포트폴리오 스냅샷</h2>
      <div class="form-group">
        <label>&#x1F4C5; 기준일</label>
        <input type="date" id="snapDate">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>&#x1F464; 사용자</label>
          <select id="snapUser"><option value="">선택</option></select>
        </div>
        <div class="form-group">
          <label>&#x1F3E6; 금융기관</label>
          <select id="snapInst"><option value="">선택</option></select>
        </div>
      </div>
      <div class="rows-header">
        <span class="rows-label">&#x1F4C8; 종목별 평가액 입력</span>
        <button class="btn-add-row" onclick="addSnapRow()">+ 종목 추가</button>
      </div>
      <div id="snapRows"></div>
      <div class="total-bar">
        <div class="lbl">총 평가액</div>
        <div class="val" id="snapTotal">&#x20A9;0</div>
      </div>
      <button class="btn-submit" id="btnSnapSubmit" onclick="submitSnapshot()">&#x1F4F7; 스냅샷 저장</button>
    </div>
  </div>
</div>

<div id="historyTab" style="display:none">
  <div class="section">
    <div class="filter-row">
      <select id="histUser" onchange="renderHistory()"><option value="">&#x1F465; 전체 사용자</option></select>
      <select id="histInst" onchange="renderHistory()"><option value="">&#x1F3E6; 전체 금융기관</option></select>
    </div>
    <div id="histContent"><div class="loading">&#x23F3; 불러오는 중...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav>
  <a href="index.html"><span class="ic">&#x1F4CA;</span>통계</a>
  <a href="trading.html"><span class="ic">&#x270F;&#xFE0F;</span>거래입력</a>
  <a href="history.html"><span class="ic">&#x1F4C8;</span>히스토리</a>
  <a href="setting.html"><span class="ic">&#x2699;&#xFE0F;</span>설정</a>
  <a href="snapshot.html" class="active"><span class="ic">&#x1F4F7;</span>스냅샷</a>
</nav>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbw42bSbW1U2SUfta-d1cjYDD5PZG6q4JeIy5yYePRKLXTWU78ueprlss2SjHSK3GpVz6g/exec';
let labelsMap = {}, allSnaps = [], rowIdx = 0;

function num(n){ return Math.round(n).toLocaleString('ko-KR'); }

function setToday(){
  const d=new Date(), y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  document.getElementById('snapDate').value=y+'-'+m+'-'+day;
}

function fillSel(id, map, ph){
  const sel=document.getElementById(id), cur=sel.value;
  sel.innerHTML='<option value="">'+ph+'</option>';
  Object.entries(map).forEach(([v,l])=>{ const o=document.createElement('option'); o.value=v; o.textContent=l; if(v===cur)o.selected=true; sel.appendChild(o); });
}

async function loadData(){
  try {
    const [lr, sr] = await Promise.all([
      fetch(GAS+'?action=api&type=labels'),
      fetch(GAS+'?action=api&type=snapshot')
    ]);
    labelsMap = await lr.json();
    allSnaps = await sr.json();
    fillSel('snapUser', labelsMap['사용자']||{}, '\uD83D\uDC64 사용자 선택');
    fillSel('snapInst', labelsMap['금융기관']||{}, '\uD83C\uDFE6 금융기관 선택');
    fillSel('histUser', labelsMap['사용자']||{}, '\uD83D\uDC65 전체 사용자');
    fillSel('histInst', labelsMap['금융기관']||{}, '\uD83C\uDFE6 전체 금융기관');
    populateSnapRows();
    renderHistory();
  } catch(e){ showToast('\u274C 데이터 로드 실패: '+e.message, true); }
}

function buildOpts(map, sel){
  return Object.entries(map).map(([v,l])=>'<option value="'+v+'"'+(v===sel?' selected':'')+'>'+l+'</option>').join('');
}

function populateSnapRows(){
  const container=document.getElementById('snapRows');
  container.innerHTML=''; rowIdx=0;
  const stocks=labelsMap['종목']||{};
  Object.keys(stocks).forEach(code=>addSnapRow(code));
  calcTotal();
}

function addSnapRow(stockCode){
  const container=document.getElementById('snapRows');
  const stocks=labelsMap['종목']||{}, prods=labelsMap['상품']||{};
  const id='sr'+(rowIdx++);
  const div=document.createElement('div');
  div.className='snap-row'; div.id=id;
  div.innerHTML=
    '<select class="sel-stock" onchange="calcTotal()"><option value="">종목</option>'+buildOpts(stocks,stockCode||'')+'</select>'+
    '<select class="sel-prod" onchange="calcTotal()"><option value="">상품</option>'+buildOpts(prods,'')+'</select>'+
    '<input type="number" class="inp-amt" placeholder="평가액" min="0" oninput="calcTotal()">'+
    '<button class="btn-rm" onclick="document.getElementById(''+id+'').remove();calcTotal()">&#x2715;</button>';
  container.appendChild(div);
  calcTotal();
}

function calcTotal(){
  const total=[...document.querySelectorAll('.inp-amt')].reduce((s,i)=>s+(parseFloat(i.value)||0),0);
  document.getElementById('snapTotal').textContent='\u20A9'+num(total);
}

async function submitSnapshot(){
  const snapDate=document.getElementById('snapDate').value;
  const snapUser=document.getElementById('snapUser').value;
  const snapInst=document.getElementById('snapInst').value;
  if(!snapDate||!snapUser||!snapInst){ showToast('\u26A0\uFE0F 기준일, 사용자, 금융기관을 선택해주세요', true); return; }
  const rows=[...document.querySelectorAll('.snap-row')];
  const items=rows.reduce((arr,row)=>{
    const stock=row.querySelector('.sel-stock').value;
    const prod=row.querySelector('.sel-prod').value;
    const amt=parseFloat(row.querySelector('.inp-amt').value)||0;
    if(stock&&prod) arr.push({'종목코드':stock,'상품ID':prod,'평가액':amt});
    return arr;
  },[]);
  if(items.length===0){ showToast('\u26A0\uFE0F 최소 1개 종목을 입력해주세요', true); return; }
  const btn=document.getElementById('btnSnapSubmit');
  btn.textContent='\u23F3 저장 중...'; btn.disabled=true;
  try {
    const res=await fetch(GAS,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'add',type:'snapshot','날짜':snapDate.replace(/-/g,'/'),'사용자ID':snapUser,'금융기관ID':snapInst,items})
    });
    const r=await res.json();
    if(r.result==='success'||r.status==='ok'||r.ok){
      showToast('\u2705 스냅샷이 저장되었습니다!');
      setToday(); populateSnapRows();
      const sr2=await fetch(GAS+'?action=api&type=snapshot');
      allSnaps=await sr2.json();
      renderHistory();
    } else showToast('\u274C 저장 실패: '+(r.message||'오류'), true);
  } catch(e){ showToast('\u274C 저장 실패: '+e.message, true); }
  finally { btn.textContent='\uD83D\uDCF7 스냅샷 저장'; btn.disabled=false; }
}

function renderHistory(){
  const el=document.getElementById('histContent');
  const fu=document.getElementById('histUser').value;
  const fi=document.getElementById('histInst').value;
  let data=[...allSnaps];
  if(fu) data=data.filter(r=>r['사용자ID']===fu);
  if(fi) data=data.filter(r=>r['금융기관ID']===fi);
  if(!data.length){ el.innerHTML='<div class="loading">\uD83D\uDCEB 스냅샷 기록이 없습니다</div>'; return; }
  const users=labelsMap['사용자']||{}, insts=labelsMap['금융기관']||{}, prods=labelsMap['상품']||{}, stocks=labelsMap['종목']||{};
  const groups={};
  data.forEach(r=>{
    const k=r['날짜']+'|'+r['사용자ID']+'|'+r['금융기관ID'];
    if(!groups[k]) groups[k]={날짜:r['날짜'],사용자ID:r['사용자ID'],금융기관ID:r['금융기관ID'],items:[]};
    groups[k].items.push(r);
  });
  const sorted=Object.values(groups).sort((a,b)=>b['날짜'].localeCompare(a['날짜']));
  el.innerHTML=sorted.map(g=>{
    const total=g.items.reduce((s,r)=>s+(r['평가액']||0),0);
    const un=users[g['사용자ID']]||g['사용자ID'], inn=insts[g['금융기관ID']]||g['금융기관ID'];
    const date=(g['날짜']||'').replace(/\//g,'.');
    const subs=g.items.map(r=>{
      const sn=stocks[r['종목코드']]||r['종목코드'], pn=prods[r['상품ID']]||r['상품ID'];
      return '<div class="snap-sub"><div><span class="sname">'+sn+'</span><br><span class="sprod">'+pn+'</span></div><span class="samt">\u20A9'+num(r['평가액']||0)+'</span></div>';
    }).join('');
    return '<div class="snap-hist-card"><div class="snap-date-row">'+date+' &middot; '+un+' &middot; '+inn+'</div>'+subs+'<div class="snap-total-row"><span class="tl">소계</span><span class="tv">\u20A9'+num(total)+'</span></div></div>';
  }).join('');
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='input')||(i===1&&tab==='history')));
  document.getElementById('inputTab').style.display=tab==='input'?'':'none';
  document.getElementById('historyTab').style.display=tab==='history'?'':'none';
}

function showToast(msg,isErr){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=isErr?'#e74c3c':'#1a1f2e';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000);
}

setToday(); loadData();
</script>
</body>
</html>
