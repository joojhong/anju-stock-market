<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스냅샷 - 안주주식마켓</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #333; padding-bottom: 72px; }
.header { background: #1a1f2e; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 18px; font-weight: 700; flex: 1; }
.header a { color: rgba(255,255,255,0.65); font-size: 13px; text-decoration: none; padding: 4px 8px; border-radius: 6px; background: rgba(255,255,255,0.1); }
.section { padding: 14px 16px; }
.card { background: white; border-radius: 14px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 12px; }
.card-title { font-size: 14px; font-weight: 700; color: #1a1f2e; margin-bottom: 4px; }
.card-sub { font-size: 11px; color: #888; margin-bottom: 16px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 11px; color: #888; font-weight: 600; margin-bottom: 6px; }
.form-group input, .form-group select { width: 100%; padding: 11px 13px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; background: white; color: #333; appearance: none; -webkit-appearance: none; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: #1a1f2e; }
.form-group input:disabled, .form-group select:disabled { background: #f8f9fa; color: #aaa; cursor: not-allowed; }
.form-group .helper { font-size: 11px; color: #aaa; margin-top: 4px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.source-box { width: 100%; display: block; box-sizing: border-box; background: white; border: 1.5px solid #ddd; border-radius: 8px; padding: 11px 13px; font-size: 13px; color: #333; word-break: break-all; line-height: 1.5; }
.source-box:focus { outline: none; border-color: #1a1f2e; }
.source-label { font-size: 11px; color: #888; font-weight: 600; margin-bottom: 6px; }
.btn-submit { width: 100%; padding: 14px; background: #1a1f2e; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 4px; }
.btn-submit:disabled { opacity: 0.6; }
.btn-manual { width: 100%; padding: 14px; background: #6c63ff; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
.btn-manual:disabled { opacity: 0.6; }
.info-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: #f0efff; color: #6c63ff; border-radius: 10px; font-size: 11px; font-weight: 600; margin-bottom: 12px; }
.current-values { margin-top: 14px; }
.val-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
.val-row:last-child { border-bottom: none; }
.val-label { font-size: 13px; color: #555; }
.val-value { font-size: 14px; font-weight: 700; color: #1a1f2e; }
.badge-active { display: inline-block; padding: 2px 8px; background: #e6f7ee; color: #27ae60; border-radius: 8px; font-size: 11px; font-weight: 600; }
.toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid #e8eaed; display: grid; grid-template-columns: repeat(5, 1fr); z-index: 100; }
nav a { display: flex; flex-direction: column; align-items: center; padding: 9px 0 7px; text-decoration: none; color: #80868b; font-size: 10px; gap: 2px; }
nav a.active { color: #1a1f2e; font-weight: 700; }
nav a .ic { font-size: 21px; }
</style>
</head>
<body>
<div class="header">
  <h1>&#x1F4F7; 스냅샷 설정</h1>
  <a href="index.html">&#x2190; 홈</a>
</div>

<div class="section">
  <!-- 자동 스냅샷 설정 현황 -->
  <div class="card">
    <div class="card-title">&#x1F4CA; 자동 스냅샷 설정</div>
    <div class="card-sub">자동 스냅샷 저장 스케줄을 관리합니다</div>
    <div class="info-badge">&#x2705; 활성화됨</div>
    <div class="current-values" id="currentValues">
      <div class="val-row"><span class="val-label">&#x1F4C5; 자동 저장일</span><span class="val-value" id="curDay">-</span></div>
      <div class="val-row"><span class="val-label">&#x1F504; 반복 주기</span><span class="val-value" id="curCycle">-</span></div>
      <div class="val-row"><span class="val-label">&#x23F0; 저장 시간</span><span class="val-value" id="curTime">-</span></div>
    </div>
  </div>

  <!-- 자동 스냅샷 설정 변경 -->
  <div class="card">
    <div class="card-title">&#x270F;&#xFE0F; 자동 스냅샷 설정 변경</div>
    <div class="card-sub">변경 후 저장 버튼을 눌러주세요</div>

    <div class="form-group">
      <label>&#x1F504; 스냅샷_반복주기</label>
      <select id="fCycle" onchange="onCycleChange()">
        <option value="일">일 (매일)</option>
        <option value="월" selected>월 (매월)</option>
      </select>
    </div>

    <div class="form-group" id="fDayGroup">
      <label>&#x1F4C5; 스냅샷_자동저장일</label>
      <input type="text" id="fDay" placeholder="예: 1 또는 1,15 (복수 입력 가능)">
      <div class="helper">매월 저장할 일자를 쉼표로 구분하여 입력 (예: 1,15)</div>
    </div>

    <div class="form-group">
      <label>&#x23F0; 스냅샷_저장시간</label>
      <input type="number" id="fHour" min="0" max="23" placeholder="예: 7">
      <div class="helper">저장할 시각 (0~23시)</div>
    </div>

    <button class="btn-submit" id="btnSave" onclick="saveSetting()">&#x1F4BE; 설정 저장</button>
  </div>

  <!-- 스냅샷 저장소스 -->
  <div class="card">
    <div class="card-title">&#x1F517; 스냅샷 저장소스</div>
    <div class="card-sub">자동 스냅샷 수집에 사용되는 API 엔드포인트</div>
    <div class="source-label">GAS API URL</div>
    <textarea class="source-box" id="sourceUrl" rows="3" placeholder="GAS API URL을 입력하세요"></textarea>
    <button class="btn-submit" style="margin-top:10px;" onclick="saveSourceUrl()">&#x1F4BE; 저장소스 저장</button>
  </div>

  <!-- 수동 스냅샷 -->
  <div class="card">
    <div class="card-title">&#x1F4F8; 수동 스냅샷</div>
    <div class="card-sub">현재 날짜 기준으로 즉시 스냅샷을 저장합니다</div>
    <button class="btn-manual" id="btnManual" onclick="takeManualSnapshot()">&#x25B6;&#xFE0F; 지금 스냅샷 저장</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav>
  <a href="index.html"><span class="ic">&#x1F4CA;</span>통계</a>
  <a href="trading.html"><span class="ic">&#x270F;&#xFE0F;</span>거래입력</a>
  <a href="history.html"><span class="ic">&#x1F4C8;</span>히스토리</a>
  <a href="setting.html"><span class="ic">&#x2699;&#xFE0F;</span>설정</a>
  <a href="snapshot.html" class="active"><span class="ic">&#x1F4F7;</span>스냅샷</a>
</nav>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbw42bSbW1U2SUfta-d1cjYDD5PZG6q4JeIy5yYePRKLXTWU78ueprlss2SjHSK3GpVz6g/exec';
const DEFAULT_SNAP_SOURCE = 'https://script.google.com/macros/s/AKfycbywM1T0g2VUYLeUbL2oDdYjL2VXSVdmhJKU2wS3JvhSUeinB1inE6Z2L3c5pLIY_wyW_A/exec?action=snapshot';

let currentSettings = {
  day: '1',
  cycle: '월',
  hour: 7,
  sourceUrl: DEFAULT_SNAP_SOURCE
};

function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? '#e74c3c' : '#1a1f2e';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function onCycleChange() {
  const cycle = document.getElementById('fCycle').value;
  const dayGroup = document.getElementById('fDayGroup');
  const dayInput = document.getElementById('fDay');
  if (cycle === '일') {
    dayGroup.style.opacity = '0.4';
    dayInput.disabled = true;
    dayInput.placeholder = '매일 자동저장 (날짜 선택 불필요)';
  } else {
    dayGroup.style.opacity = '1';
    dayInput.disabled = false;
    dayInput.placeholder = '예: 1 또는 1,15 (복수 입력 가능)';
  }
}

function renderCurrentValues() {
  const cycle = currentSettings.cycle;
  const dayVal = currentSettings.day;
  const hourVal = currentSettings.hour;

  let dayDisplay = '-';
  if (cycle === '일') {
    dayDisplay = '매일';
  } else {
    dayDisplay = '매월 ' + dayVal + '일';
  }

  document.getElementById('curDay').textContent = dayDisplay;
  document.getElementById('curCycle').textContent = cycle === '일' ? '일 (매일)' : '월 (매월)';
  document.getElementById('curTime').textContent = hourVal + '시';

  document.getElementById('fCycle').value = cycle;
  document.getElementById('fDay').value = cycle === '월' ? dayVal : '';
  document.getElementById('fHour').value = hourVal;
  document.getElementById('sourceUrl').value = currentSettings.sourceUrl || DEFAULT_SNAP_SOURCE;

  onCycleChange();
}

async function loadSettings() {
  try {
    const res = await fetch(GAS + '?action=api&type=snapshot_config');
    const text = await res.text();
    if (text && !text.startsWith('<')) {
      const data = JSON.parse(text);
      if (data) {
        currentSettings = {
          day: data.day || '1',
          cycle: data.cycle || '월',
          hour: data.hour !== undefined ? data.hour : 7,
          sourceUrl: data.sourceUrl || DEFAULT_SNAP_SOURCE
        };
      }
    }
  } catch(e) {
    // Use defaults
  }
  renderCurrentValues();
}

async function saveSetting() {
  const cycle = document.getElementById('fCycle').value;
  const dayRaw = document.getElementById('fDay').value.trim();
  const hour = parseInt(document.getElementById('fHour').value);

  let day = dayRaw;
  if (cycle === '월') {
    if (!dayRaw) { showToast('⚠️ 저장일을 입력해주세요', true); return; }
    // Validate comma-separated days
    const days = dayRaw.split(',').map(d => d.trim());
    for (const d of days) {
      const n = parseInt(d);
      if (isNaN(n) || n < 1 || n > 31) {
        showToast('⚠️ 저장일은 1~31 사이의 숫자를 입력해주세요 (복수: 예 1,15)', true);
        return;
      }
    }
    day = days.join(',');
  } else {
    day = '';
  }

  if (isNaN(hour) || hour < 0 || hour > 23) {
    showToast('⚠️ 저장시간을 0~23 사이로 입력해주세요', true); return;
  }

  const btn = document.getElementById('btnSave');
  btn.textContent = '⏳ 저장 중...'; btn.disabled = true;

  try {
    const res = await fetch(GAS, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'update', type: 'snapshot_config', day, cycle, hour })
    });
    const r = await res.json();
    if (r.result === 'success' || r.status === 'ok' || r.ok) {
      currentSettings = { ...currentSettings, day, cycle, hour };
      renderCurrentValues();
      showToast('✅ 자동 스냅샷 설정이 저장되었습니다!');
      setTimeout(() => location.reload(true), 1500);
    } else {
      currentSettings = { ...currentSettings, day, cycle, hour };
      renderCurrentValues();
      showToast('✅ 설정값이 변경되었습니다');
      setTimeout(() => location.reload(true), 1500);
    }
  } catch(e) {
    currentSettings = { ...currentSettings, day, cycle, hour };
    renderCurrentValues();
    showToast('✅ 설정값이 변경되었습니다');
  } finally {
    btn.textContent = '💾 설정 저장'; btn.disabled = false;
  }
}

async function saveSourceUrl() {
  const sourceUrl = document.getElementById('sourceUrl').value.trim();
  if (!sourceUrl) { showToast('⚠️ API URL을 입력해주세요', true); return; }

  try {
    const res = await fetch(GAS, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'update', type: 'snapshot_source', sourceUrl })
    });
    const r = await res.json();
    currentSettings.sourceUrl = sourceUrl;
    showToast('✅ 저장소스 URL이 저장되었습니다!');
  } catch(e) {
    currentSettings.sourceUrl = sourceUrl;
    showToast('✅ 저장소스 URL이 변경되었습니다');
  }
}

async function takeManualSnapshot() {
  const btn = document.getElementById('btnManual');
  btn.textContent = '⏳ 저장 중...'; btn.disabled = true;
  const d = new Date();
  const dateStr = d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
  try {
    const res = await fetch(GAS, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'snapshot' })
    });
    const text = await res.text();
    let success = false;
    if (text && !text.startsWith('<')) {
      try { const r = JSON.parse(text); success = r.result === 'success' || r.status === 'ok' || r.ok; }
      catch { success = res.ok; }
    } else { success = res.ok; }
    if (success) showToast('✅ 수동 스냅샷 저장 완료 (' + dateStr + ')');
    else showToast('❌ 저장 실패: ' + text.substring(0,100));
  } catch (err) {
    showToast('❌ 오류: ' + err.message);
  } finally {
    btn.textContent = '▶️ 지금 스냅샷 저장'; btn.disabled = false;
  }
}

loadSettings();
</script>
</body>
</html>
